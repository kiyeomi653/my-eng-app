<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Master</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            
            // 데이터 상태 관리
            const [vocab, setVocab] = useState([]);
            const [settings, setSettings] = useState({ wordGoal: 20, writeGoal: 3 });
            const [progress, setProgress] = useState({ wordsDone: 0, writesDone: 0 });
            const [rawText, setRawText] = useState('');

            // 로컬 스토리지 초기 로드
            useEffect(() => {
                const savedVocab = localStorage.getItem('myVocab');
                const savedSettings = localStorage.getItem('mySettings');
                const savedProgress = localStorage.getItem('myProgress');
                
                if (savedVocab) setVocab(JSON.parse(savedVocab));
                if (savedSettings) setSettings(JSON.parse(savedSettings));
                if (savedProgress) setProgress(JSON.parse(savedProgress));
            }, []);

            // 상태 변경 시 자동 저장
            const updateProgress = (newProgress) => {
                setProgress(newProgress);
                localStorage.setItem('myProgress', JSON.stringify(newProgress));
            };

            const handleUpload = () => {
                const rows = rawText.trim().split('\n');
                const data = rows.map(row => {
                    const [word, def, ex] = row.split('\t');
                    return { word: word || '', def: def || '', ex: ex || '' };
                });
                setVocab(data);
                localStorage.setItem('myVocab', JSON.stringify(data));
                alert('단어장이 업로드되었습니다!');
                setPage('study');
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-indigo-600">English Master</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 border rounded-xl shadow-sm">
                            <i data-lucide={menuOpen ? "x" : "menu"}></i>
                        </button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-16 w-56 bg-white rounded-3xl p-6 shadow-2xl space-y-5" onClick={e => e.stopPropagation()}>
                                <NavItem icon="layout" label="홈" onClick={() => {setPage('dashboard'); setMenuOpen(false)}} />
                                <NavItem icon="settings" label="목표 설정" onClick={() => {setPage('settings'); setMenuOpen(false)}} />
                                <NavItem icon="upload" label="단어 업로드" onClick={() => {setPage('upload'); setMenuOpen(false)}} />
                                <NavItem icon="book-open" label="단어 학습" onClick={() => {setPage('study'); setMenuOpen(false)}} />
                                <NavItem icon="pen-tool" label="작문/첨삭" onClick={() => {setPage('writing'); setMenuOpen(false)}} />
                            </div>
                        </div>
                    )}

                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && <Dashboard settings={settings} progress={progress} />}
                        {page === 'settings' && <SettingsView settings={settings} setSettings={(s) => {setSettings(s); localStorage.setItem('mySettings', JSON.stringify(s)); alert('설정 저장됨!')}} />}
                        {page === 'upload' && (
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                                <h2 className="text-xl font-bold mb-4">단어장 업로드</h2>
                                <textarea className="w-full h-40 p-4 bg-slate-50 border rounded-2xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="단어(탭)뜻(탭)예문" value={rawText} onChange={(e) => setRawText(e.target.value)} />
                                <button onClick={handleUpload} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100">저장하기</button>
                            </div>
                        )}
                        {page === 'study' && <StudyView vocab={vocab} progress={progress} updateProgress={updateProgress} />}
                        {page === 'writing' && <WritingView progress={progress} updateProgress={updateProgress} />}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        // --- 컴포넌트 섹션 ---

        function NavItem({ icon, label, onClick }) {
            return (
                <div onClick={onClick} className="flex items-center gap-4 text-slate-700 font-semibold cursor-pointer active:text-indigo-600 transition">
                    <i data-lucide={icon} size="20"></i> {label}
                </div>
            );
        }

        function Dashboard({ settings, progress }) {
            // 달성도 계산
            const wordRate = Math.min(100, (progress.wordsDone / settings.wordGoal) * 100);
            const writeRate = Math.min(100, (progress.writesDone / settings.writeGoal) * 100);
            const totalRate = Math.round((wordRate + writeRate) / 2);

            return (
                <div className="space-y-6">
                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                        <div className="relative z-10">
                            <p className="text-indigo-100 font-medium">오늘의 달성도</p>
                            <h2 className="text-5xl font-black mt-2">{totalRate}%</h2>
                            <div className="w-full bg-white/20 h-3 rounded-full mt-6">
                                <div className="bg-white h-3 rounded-full transition-all duration-1000" style={{width: `${totalRate}%`}}></div>
                            </div>
                        </div>
                        <div className="absolute -right-4 -bottom-4 bg-white/10 w-32 h-32 rounded-full"></div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <StatCard label="단어" current={progress.wordsDone} goal={settings.wordGoal} color="bg-blue-50 text-blue-600" />
                        <StatCard label="작문" current={progress.writesDone} goal={settings.writeGoal} color="bg-purple-50 text-purple-600" />
                    </div>
                </div>
            );
        }

        function StatCard({ label, current, goal, color }) {
            return (
                <div className={`${color} p-5 rounded-3xl border border-white/50`}>
                    <p className="text-sm font-bold opacity-80">{label}</p>
                    <p className="text-2xl font-black mt-1">{current} / {goal}</p>
                </div>
            );
        }

        function SettingsView({ settings, setSettings }) {
            return (
                <div className="bg-white p-8 rounded-[2rem] shadow-sm border space-y-6">
                    <h2 className="text-xl font-bold">🎯 목표 설정</h2>
                    <div>
                        <label className="block text-sm text-slate-500 mb-2">하루 단어 목표 ({settings.wordGoal}개)</label>
                        <input type="range" min="5" max="100" step="5" value={settings.wordGoal} onChange={(e) => setSettings({...settings, wordGoal: e.target.value})} className="w-full accent-indigo-600" />
                    </div>
                    <div>
                        <label className="block text-sm text-slate-500 mb-2">하루 작문 목표 ({settings.writeGoal}문장)</label>
                        <input type="range" min="1" max="10" step="1" value={settings.writeGoal} onChange={(e) => setSettings({...settings, writeGoal: e.target.value})} className="w-full accent-indigo-600" />
                    </div>
                </div>
            );
        }

        function StudyView({ vocab, progress, updateProgress }) {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);

            const handleNext = () => {
                if (idx < vocab.length - 1) {
                    setIdx(idx + 1);
                    setFlipped(false);
                    updateProgress({...progress, wordsDone: progress.wordsDone + 1});
                }
            };

            if (vocab.length === 0) return <div className="text-center py-20 text-slate-400">단어장을 먼저 업로드해주세요!</div>;

            return (
                <div className="flex flex-col items-center">
                    <div onClick={() => setFlipped(!flipped)} className={`w-full aspect-square flex flex-col items-center justify-center p-10 rounded-[3rem] shadow-2xl transition-all duration-500 transform ${flipped ? 'bg-indigo-600 text-white rotate-y-180' : 'bg-white border-2 border-slate-100'}`}>
                        <h3 className="text-4xl font-black">{flipped ? vocab[idx].def : vocab[idx].word}</h3>
                        {flipped && <p className="mt-6 text-indigo-100 italic text-center">{vocab[idx].ex}</p>}
                    </div>
                    <div className="mt-10 flex items-center gap-8">
                        <button onClick={handleNext} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">다음 단어</button>
                    </div>
                </div>
            );
        }

        function WritingView({ progress, updateProgress }) {
            const [text, setText] = useState('');
            const [feedback, setFeedback] = useState(null);

            const handleCheck = () => {
                if (text.length < 5) return alert('조금 더 길게 써보세요!');
                
                // AI 첨삭 시뮬레이션
                const score = Math.floor(Math.random() * 21) + 80; // 80~100점
                setFeedback({
                    score: score,
                    correction: "Great job! 문법이 전반적으로 훌륭합니다.",
                    tip: "관사(a, the) 사용에 조금 더 유의해보세요."
                });
                updateProgress({...progress, writesDone: progress.writesDone + 1});
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <h2 className="text-xl font-bold mb-4">AI 문장 첨삭</h2>
                        <textarea className="w-full h-40 p-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="오늘 배운 단어를 활용해 문장을 써보세요." value={text} onChange={(e) => setText(e.target.value)} />
                        <button onClick={handleCheck} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-bold">첨삭 받기 완료</button>
                    </div>
                    
                    {feedback && (
                        <div className="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100 animate-bounce-in">
                            <div className="flex justify-between items-center mb-2">
                                <span className="font-bold text-emerald-700">AI 점수: {feedback.score}점</span>
                                <i data-lucide="sparkles" className="text-emerald-500"></i>
                            </div>
                            <p className="text-emerald-900 font-semibold mb-2">{feedback.correction}</p>
                            <p className="text-sm text-emerald-700 opacity-80 leading-relaxed">💡 Tip: {feedback.tip}</p>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
