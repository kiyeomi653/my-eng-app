<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Writing</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-active:active { transform: scale(0.95); }
        .tooltip-box { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; white-space: nowrap; z-index: 100; margin-bottom: 5px; }
        .tooltip-box::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1e293b; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 900; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const POOL_KEY = 'Writing_v6_final_pool';
        const USER_DB_KEY = 'Writing_user_registry_v6';
        const CATS = { Daily: "일상 대화", Wisdom: "명언과 격언", Cinema: "영화 대사" };

        function App() {
            const [user, setUser] = useState(localStorage.getItem('currentUser') || '');
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [category, setCategory] = useState(null);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem(`writingHistory_${user}`)) || []);
            const [pool, setPool] = useState(() => JSON.parse(localStorage.getItem(POOL_KEY)) || { Daily: [], Wisdom: [], Cinema: [] });
            const [loadingState, setLoadingState] = useState({ Daily: false, Wisdom: false, Cinema: false });
            const [userRegistry, setUserRegistry] = useState(() => JSON.parse(localStorage.getItem(USER_DB_KEY)) || []);
            const [selectedLearner, setSelectedLearner] = useState(null);

            useEffect(() => { localStorage.setItem(POOL_KEY, JSON.stringify(pool)); }, [pool]);
            useEffect(() => { localStorage.setItem(USER_DB_KEY, JSON.stringify(userRegistry)); }, [userRegistry]);

            // 접속 기록 업데이트 (상세 로그 배열 추가)
            useEffect(() => {
                if (user) {
                    const now = new Date().toLocaleString();
                    setUserRegistry(prev => {
                        const exists = prev.find(u => u.name === user);
                        if (exists) {
                            const newLog = { in: now, out: '접속 중...' };
                            return prev.map(u => u.name === user ? { ...u, isOnline: true, logs: [newLog, ...(u.logs || [])].slice(0, 50) } : u);
                        }
                        return [...prev, { name: user, isOnline: true, logs: [{ in: now, out: '접속 중...' }] }];
                    });

                    const handleUnload = () => {
                        const db = JSON.parse(localStorage.getItem(USER_DB_KEY)) || [];
                        const updated = db.map(u => {
                            if (u.name === user) {
                                const lastLog = u.logs[0];
                                if (lastLog) lastLog.out = new Date().toLocaleString();
                                return { ...u, isOnline: false };
                            }
                            return u;
                        });
                        localStorage.setItem(USER_DB_KEY, JSON.stringify(updated));
                    };
                    window.addEventListener('beforeunload', handleUnload);
                    return () => window.removeEventListener('beforeunload', handleUnload);
                }
            }, [user]);

            const fetchQuoteFromAPI = async (cat) => {
                const cb = Math.random().toString(36).substring(7);
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://zenquotes.io/api/random?cb=${cb}`)}`;
                try {
                    const res = await fetch(proxy);
                    const data = await res.json();
                    const raw = JSON.parse(data.contents)[0];
                    if (!raw || raw.q.includes("Too many requests")) return null;
                    const wordCount = raw.q.split(" ").length;
                    let isMatch = false;
                    if (cat === 'Daily') isMatch = (wordCount <= 7);
                    else if (cat === 'Wisdom') isMatch = (wordCount >= 8);
                    else if (cat === 'Cinema') isMatch = (wordCount >= 4 && wordCount <= 13);

                    if (isMatch) {
                        const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(raw.q)}`);
                        const tData = await tRes.json();
                        return { def: tData[0][0][0], ex: raw.q, id: Date.now()+Math.random() };
                    }
                } catch (e) { return null; }
                return null;
            };

            const fillSpecificPool = async (cat) => {
                if (loadingState[cat] || (pool[cat]?.length >= 20)) return;
                setLoadingState(p => ({ ...p, [cat]: true }));
                const batch = Array.from({ length: 4 }, () => fetchQuoteFromAPI(cat));
                try {
                    const results = await Promise.all(batch);
                    const valid = results.filter(q => q !== null);
                    if (valid.length > 0) setPool(p => ({ ...p, [cat]: [...(p[cat] || []), ...valid].slice(0, 25) }));
                } finally { setLoadingState(p => ({ ...p, [cat]: false })); }
            };

            useEffect(() => {
                if (user) {
                    const tick = () => Object.keys(CATS).forEach(c => { if ((pool[c]?.length || 0) < 5) fillSpecificPool(c); });
                    tick(); const itv = setInterval(tick, 8000); return () => clearInterval(itv);
                }
            }, [user, pool]);

            const speak = (t) => { if(!t) return; window.speechSynthesis.cancel(); const s = new SpeechSynthesisUtterance(t); s.lang = 'en-US'; s.rate = 0.9; window.speechSynthesis.speak(s); };

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-6">
                    <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl text-center">
                        <h1 className="text-4xl font-black text-indigo-600 mb-8 italic tracking-tighter">Writing</h1>
                        <input id="un" className="w-full p-4 bg-slate-50 border-2 rounded-2xl mb-4 font-bold text-center outline-none" placeholder="이름 입력" />
                        <button onClick={() => {const v=document.getElementById('un').value; if(v){setUser(v); localStorage.setItem('currentUser', v);}}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black btn-active">입장하기</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10 max-w-md mx-auto relative">
                    <header className="p-5 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b shadow-sm">
                        <h1 className="font-black text-2xl text-indigo-600 italic tracking-tighter" onClick={() => setPage('dashboard')}>Writing</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 bg-slate-50 rounded-xl text-slate-600 btn-active"><i data-lucide={menuOpen?"x":"menu"}></i></button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/30 z-40 animate-fade" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-20 w-60 bg-white rounded-[2.5rem] p-6 shadow-2xl space-y-2" onClick={e=>e.stopPropagation()}>
                                <div onClick={()=>{setPage('dashboard');setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="home"></i> 홈</div>
                                <div onClick={()=>{setPage('history');setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="award"></i> 기록</div>
                                <div onClick={()=>{
                                    const pw = prompt("비밀번호");
                                    if(pw==='1234'){setPage('admin_home');setMenuOpen(false);}
                                }} className="flex items-center gap-4 p-4 font-bold text-indigo-600 hover:bg-indigo-50 rounded-2xl cursor-pointer"><i data-lucide="shield"></i> 관리자 설정</div>
                                <hr />
                                <div onClick={()=>{
                                    const db = JSON.parse(localStorage.getItem(USER_DB_KEY)) || [];
                                    const updated = db.map(u => u.name === user ? { ...u, isOnline: false, logs: u.logs.map((l,idx)=>idx===0?{...l, out:new Date().toLocaleString()}:l) } : u);
                                    localStorage.setItem(USER_DB_KEY, JSON.stringify(updated));
                                    localStorage.removeItem('currentUser'); location.reload();
                                }} className="flex items-center gap-4 p-4 font-bold text-red-400 hover:bg-red-50 rounded-2xl cursor-pointer"><i data-lucide="log-out"></i> 로그아웃</div>
                            </div>
                        </div>
                    )}

                    <main className="p-6">
                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <div className="grid gap-3">
                                    {Object.keys(CATS).map(c => (
                                        <button key={c} onClick={()=>{setCategory(c); 
                                            if(pool[c]?.length > 0) { setCurrentQuote(pool[c][0]); setPool(p=>({...p, [c]:p[c].slice(1)})); fillSpecificPool(c); }
                                            else { alert("충전 중..."); fillSpecificPool(c); }
                                        }} className={`py-5 px-8 rounded-2xl font-black transition-all btn-active border-2 ${category===c?'bg-indigo-600 border-indigo-600 text-white':'bg-white border-slate-50 text-slate-500'}`}>{CATS[c]}</button>
                                    ))}
                                </div>
                                {category && currentQuote && (
                                    <div className="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl animate-fade">
                                        <h2 className="text-2xl font-black leading-tight italic mb-8">"{currentQuote.def}"</h2>
                                        <button onClick={()=>setPage('quiz')} className="bg-white text-indigo-600 w-full py-4 rounded-2xl font-black btn-active">훈련 시작</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'quiz' && (
                            <QuizView q={currentQuote} onNext={()=>{
                                if(pool[category]?.length > 0) { setCurrentQuote(pool[category][0]); setPool(p=>({...p, [category]:p[category].slice(1)})); fillSpecificPool(category); }
                                else { setPage('dashboard'); }
                            }} onFinish={(q,s)=>{
                                const h = [{date:new Date().toLocaleDateString(), quote:q.ex, def:q.def, score:s}, ...history].slice(0,50);
                                setHistory(h); localStorage.setItem(`writingHistory_${user}`, JSON.stringify(h));
                            }} speak={speak} onHome={()=>setPage('dashboard')} />
                        )}

                        {page === 'history' && (
                            <div className="space-y-4 animate-fade">
                                <h2 className="text-2xl font-black mb-6">Records</h2>
                                {history.map((h, i) => (
                                    <div key={i} className="bg-white p-5 rounded-[2rem] border flex justify-between items-center shadow-sm">
                                        <div className="flex-1 pr-4 font-bold text-sm">"{h.def}"</div>
                                        <button onClick={()=>speak(h.quote)} className="p-3 text-indigo-400 bg-indigo-50 rounded-2xl"><i data-lucide="volume-2" size="20"></i></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {page === 'admin_home' && (
                            <div className="space-y-6 animate-fade">
                                <h2 className="text-2xl font-black">Admin Panel</h2>
                                <button onClick={()=>setPage('admin_learners')} className="w-full bg-white p-6 rounded-3xl border flex justify-between font-black items-center">학습자 기록 관리 <i data-lucide="chevron-right"></i></button>
                                <button onClick={()=>setPage('dashboard')} className="w-full py-4 text-slate-400">나가기</button>
                            </div>
                        )}

                        {page === 'admin_learners' && (
                            <div className="space-y-4 animate-fade">
                                <div className="flex items-center gap-4 mb-6">
                                    <button onClick={()=>setPage('admin_home')}><i data-lucide="arrow-left"></i></button>
                                    <h2 className="text-xl font-black">Learner Status</h2>
                                </div>
                                <div className="bg-white rounded-3xl border shadow-sm overflow-hidden">
                                    {userRegistry.map((u, i) => (
                                        <div key={i} className="flex justify-between items-center p-5 border-b last:border-0">
                                            <div className="cursor-pointer flex items-center gap-3" onClick={()=>setSelectedLearner(u)}>
                                                <span className={`w-3 h-3 rounded-full ${u.isOnline ? 'bg-emerald-500 animate-pulse' : 'bg-slate-300'}`}></span>
                                                <span className="font-black text-slate-700">{u.name}</span>
                                            </div>
                                            <div className="text-[10px] font-bold text-slate-400">{u.isOnline ? '접속 중' : '오프라인'}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 학습자 상세 로그 팝업 */}
                    {selectedLearner && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-end sm:items-center justify-center p-4 animate-fade" onClick={()=>setSelectedLearner(null)}>
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 max-h-[80vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-xl">{selectedLearner.name}의 기록</h3>
                                    <button onClick={()=>setSelectedLearner(null)} className="p-2 bg-slate-100 rounded-full"><i data-lucide="x" size="18"></i></button>
                                </div>
                                <table>
                                    <thead><tr><th>접속 시각</th><th>종료 시각</th></tr></thead>
                                    <tbody>
                                        {selectedLearner.logs.map((l,idx)=>(
                                            <tr key={idx}><td>{l.in}</td><td className={l.out==='접속 중...'?'text-emerald-500 font-bold':''}>{l.out}</td></tr>
                                        ))}
                                    </tbody>
                                </table>
                                <button onClick={()=>{
                                    const pw = prompt("비밀번호");
                                    if(pw==='1234'){
                                        setUserRegistry(prev=>prev.filter(u=>u.name!==selectedLearner.name));
                                        setSelectedLearner(null);
                                    }
                                }} className="w-full mt-8 py-4 bg-red-50 text-red-500 rounded-2xl font-black">학습자 삭제</button>
                            </div>
                        </div>
                    )}
                    <IconUpdate />
                </div>
            );
        }

        // --- 지적 기능이 복원된 퀴즈 컴포넌트 ---
        function QuizView({ q, onNext, onFinish, speak, onHome }) {
            const [input, setInput] = useState('');
            const [checked, setChecked] = useState(false);
            const [hintOpen, setHintOpen] = useState(false);
            const [activeTooltip, setActiveTooltip] = useState(null);
            const [correction, setCorrection] = useState([]);

            const shuffledWords = useMemo(() => q?.ex.replace(/[.,!;?]/g, "").split(" ").sort(() => Math.random() - 0.5) || [], [q]);

            const check = () => {
                const target = q.ex.trim().split(/\s+/);
                const userWords = input.trim().split(/\s+/);
                
                // 단어별 지적(Correction) 로직
                const diff = userWords.map((w, i) => {
                    const cleanW = w.toLowerCase().replace(/[.,!?]/g, "");
                    const cleanT = (target[i] || "").toLowerCase().replace(/[.,!?]/g, "");
                    return { w, ok: cleanW === cleanT };
                });

                setCorrection(diff);
                const score = Math.round((diff.filter(x => x.ok).length / Math.max(target.length, userWords.length)) * 100);
                onFinish(q, `${score}점`);
                setChecked(true); speak(q.ex);
            };

            const toggleTooltip = async (word, index) => {
                if (activeTooltip === index) { setActiveTooltip(null); return; }
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(word)}`);
                const data = await res.json();
                setActiveTooltip({ index, meaning: data[0][0][0] });
            };

            return (
                <div className="bg-white p-7 rounded-[3rem] border shadow-sm animate-fade relative" onClick={() => setActiveTooltip(null)}>
                    <h3 className="text-xl font-black mb-6 italic text-slate-800">"{q.def}"</h3>
                    
                    {!checked && (
                        <div className="mb-4">
                            {!hintOpen ? (
                                <button onClick={() => setHintOpen(true)} className="text-[10px] font-black text-indigo-500 bg-indigo-50 px-4 py-2 rounded-xl">힌트 보기</button>
                            ) : (
                                <div className="bg-slate-50 p-4 rounded-2xl flex flex-wrap gap-2 animate-fade">
                                    {shuffledWords.map((w, i) => (
                                        <div key={i} className="relative">
                                            {activeTooltip?.index === i && <div className="tooltip-box">{activeTooltip.meaning}</div>}
                                            <span onClick={(e) => { e.stopPropagation(); toggleTooltip(w, i); }} className="bg-white px-2 py-1 rounded-lg border text-[10px] font-bold text-slate-400">{w}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    <textarea value={input} onChange={e => setInput(e.target.value)} className="w-full h-40 p-5 bg-slate-50 rounded-[2rem] mb-4 outline-none text-lg font-medium resize-none shadow-inner" placeholder="영작을 입력하세요..." />
                    
                    {!checked ? (
                        <button onClick={check} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg">정답 확인</button>
                    ) : (
                        <div className="space-y-4 animate-fade">
                            <div className="p-5 bg-slate-50 rounded-2xl text-lg flex flex-wrap gap-2">
                                {correction.map((item, i) => (
                                    <span key={i} className={item.ok ? "text-emerald-600 font-bold" : "text-red-500 font-bold line-through decoration-2"}>{item.w}</span>
                                ))}
                                {correction.length === 0 && <span className="text-red-500 font-bold">내용 없음</span>}
                            </div>
                            <div className="p-5 bg-indigo-600 rounded-[2rem] text-white flex justify-between items-center shadow-lg">
                                <p className="font-bold text-sm italic">"{q.ex}"</p>
                                <button onClick={()=>speak(q.ex)} className="p-2"><i data-lucide="volume-2"></i></button>
                            </div>
                            <button onClick={()=>{setChecked(false); setInput(''); setHintOpen(false); onNext()}} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black btn-active">다음 문장</button>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() { useEffect(() => { if (window.lucide) lucide.createIcons(); }); return null; }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
