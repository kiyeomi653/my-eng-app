<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisdom AI - High Speed</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-active:active { transform: scale(0.95); }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const POOL_KEY = 'wisdom_v4_pool';
        
        // 데이터가 없을 때를 대비한 즉시 실행용 로컬 백업 데이터
        const BACKUP_QUOTES = {
            Easy: [{def: "단순한 것이 최고다.", ex: "Simple is the best."}, {def: "지금 시작하세요.", ex: "Start right now."}],
            Medium: [{def: "성공은 매일 반복되는 작은 노력의 합이다.", ex: "Success is the sum of small efforts repeated daily."}],
            Hard: [{def: "당신이 할 수 있다고 믿든 할 수 없다고 믿든, 당신의 믿음대로 될 것이다.", ex: "Whether you think you can or you think you can't, you're right."}]
        };

        function App() {
            const [user, setUser] = useState(localStorage.getItem('currentUser') || '');
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [level, setLevel] = useState(null);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem(`wisdomHistory_${user}`)) || []);
            const [pool, setPool] = useState(JSON.parse(localStorage.getItem(POOL_KEY)) || { Easy: [], Medium: [], Hard: [] });
            const [loadingState, setLoadingState] = useState({ Easy: false, Medium: false, Hard: false });

            // 1. 데이터 저장
            useEffect(() => {
                localStorage.setItem(POOL_KEY, JSON.stringify(pool));
            }, [pool]);

            // 2. 초기 기동 시 데이터 자동 충전
            useEffect(() => {
                if (user) fillAllPools();
            }, [user]);

            const speak = (text) => {
                if(!text) return;
                window.speechSynthesis.cancel();
                const s = new SpeechSynthesisUtterance(text);
                s.lang = 'en-US'; s.rate = 0.9;
                window.speechSynthesis.speak(s);
            };

            // 3. 고속 멀티 통로 API 엔진
            const fetchQuoteFromAPI = async (targetLevel) => {
                // 여러 프록시를 교대로 사용하여 차단 회피
                const proxies = [
                    (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                    (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
                ];
                const proxyIdx = Math.floor(Math.random() * proxies.length);
                const apiUrl = `https://zenquotes.io/api/random?cb=${Math.random()}`;

                try {
                    const res = await fetch(proxies[proxyIdx](apiUrl));
                    const json = await res.json();
                    const rawData = proxyIdx === 0 ? JSON.parse(json.contents)[0] : json[0];
                    
                    if(!rawData || !rawData.q) return null;

                    const wordCount = rawData.q.split(" ").length;
                    const isMatch = (targetLevel === 'Easy' && wordCount <= 6) ||
                                 (targetLevel === 'Medium' && wordCount >= 7 && wordCount <= 11) ||
                                 (targetLevel === 'Hard' && wordCount >= 12);

                    if (isMatch) {
                        const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(rawData.q)}`);
                        const tData = await tRes.json();
                        return { def: tData[0][0][0], ex: rawData.q, id: Date.now() + Math.random() };
                    }
                } catch (e) { return null; }
                return null;
            };

            // 4. 병렬 충전 로직 (속도 핵심)
            const fillAllPools = async () => {
                ['Easy', 'Medium', 'Hard'].forEach(l => fillSpecificPool(l));
            };

            const fillSpecificPool = async (l) => {
                if (loadingState[l] || (pool[l] && pool[l].length >= 10)) return;
                
                setLoadingState(prev => ({ ...prev, [l]: true }));
                
                // 동시에 3개씩 병렬 요청 (속도 향상)
                const tasks = [fetchQuoteFromAPI(l), fetchQuoteFromAPI(l), fetchQuoteFromAPI(l)];
                const results = await Promise.all(tasks);
                
                const validQuotes = results.filter(q => q !== null);
                if (validQuotes.length > 0) {
                    setPool(prev => ({ ...prev, [l]: [...(prev[l] || []), ...validQuotes].slice(0, 15) }));
                }
                
                setLoadingState(prev => ({ ...prev, [l]: false }));
            };

            const getNextQuote = (targetLevel) => {
                // 1. 복습 (10%)
                if (history.length > 5 && Math.random() < 0.1) {
                    const rev = history[Math.floor(Math.random() * history.length)];
                    setCurrentQuote({ def: rev.def, ex: rev.quote, isReview: true });
                    return;
                }

                // 2. 풀에서 즉시 추출
                if (pool[targetLevel] && pool[targetLevel].length > 0) {
                    const next = pool[targetLevel][0];
                    setCurrentQuote({ ...next, isReview: false });
                    setPool(prev => ({ ...prev, [targetLevel]: prev[targetLevel].slice(1) }));
                    fillSpecificPool(targetLevel); // 사용 즉시 하나 더 보충
                } else {
                    // 3. 풀이 비었으면 백업 데이터 즉시 사용 (로딩 지연 방지)
                    const backups = BACKUP_QUOTES[targetLevel];
                    const randBackup = backups[Math.floor(Math.random() * backups.length)];
                    setCurrentQuote({ ...randBackup, isReview: false });
                    fillSpecificPool(targetLevel); // 백그라운드에서 진짜 데이터 충전 시도
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-6">
                        <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl text-center">
                            <h1 className="text-3xl font-black text-indigo-600 mb-2 italic">Wisdom AI</h1>
                            <p className="text-slate-400 text-xs mb-8 font-bold">SMART ENGLISH TUTOR</p>
                            <input id="u_name" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-4 font-bold outline-none text-center" placeholder="Name" onKeyDown={(e)=>e.key==='Enter'&&setUser(e.target.value)} />
                            <button onClick={() => {const v=document.getElementById('u_name').value; if(v) setUser(v)}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg btn-active">시작하기</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 max-w-md mx-auto relative">
                    <header className="p-5 flex justify-between items-center bg-white/90 backdrop-blur-sm sticky top-0 z-50 border-b border-slate-100">
                        <h1 className="font-black text-xl text-indigo-600 flex items-center gap-2" onClick={() => {setPage('dashboard'); setLevel(null);}}>
                            <i data-lucide="zap" fill="currentColor"></i> Wisdom
                        </h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 bg-slate-50 rounded-xl text-slate-600 btn-active">
                            <i data-lucide={menuOpen ? "x" : "menu"}></i>
                        </button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/30 z-40 animate-fade" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-20 w-60 bg-white rounded-[2.5rem] p-6 shadow-2xl space-y-2" onClick={e => e.stopPropagation()}>
                                <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="home" size="18"></i> 홈</div>
                                <div onClick={() => {setPage('history'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="award" size="18"></i> 학습 기록</div>
                                <div onClick={() => {setPage('db_status'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold text-indigo-600 hover:bg-indigo-50 rounded-2xl cursor-pointer"><i data-lucide="database" size="18"></i> 데이터 관리</div>
                                <hr className="my-2 border-slate-50" />
                                <div onClick={() => {localStorage.clear(); location.reload();}} className="flex items-center gap-4 p-4 font-bold text-red-400 hover:bg-red-50 rounded-2xl cursor-pointer"><i data-lucide="refresh-ccw" size="18"></i> 앱 초기화</div>
                            </div>
                        </div>
                    )}

                    <main className="p-6">
                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <div className="flex justify-between items-center mb-4 px-1">
                                        <h3 className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Difficulty</h3>
                                        <span className="flex gap-1">
                                            {['Easy', 'Medium', 'Hard'].map(l => (
                                                <div key={l} className={`w-1.5 h-1.5 rounded-full ${loadingState[l] ? 'bg-indigo-400 animate-ping' : pool[l]?.length > 0 ? 'bg-emerald-400' : 'bg-slate-200'}`}></div>
                                            ))}
                                        </span>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Easy', 'Medium', 'Hard'].map(l => (
                                            <button key={l} onClick={() => {setLevel(l); getNextQuote(l)}} className={`py-4 rounded-2xl font-black text-xs transition-all btn-active border-2 ${level === l ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                {l === 'Easy' ? '초급' : l === 'Medium' ? '중급' : '고급'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {level && currentQuote && (
                                    <div className="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl min-h-[260px] flex flex-col justify-between animate-fade relative overflow-hidden">
                                        <div className="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                                        <div className="flex justify-between items-center relative z-10">
                                            <span className="text-[10px] font-black bg-white/20 px-3 py-1 rounded-full uppercase tracking-tighter">
                                                {currentQuote.isReview ? 'Review' : `${level} Ready`}
                                            </span>
                                            <button onClick={() => getNextQuote(level)} className="p-2 hover:rotate-180 transition-transform duration-500"><i data-lucide="rotate-cw" size="18"></i></button>
                                        </div>
                                        <h2 className="text-2xl font-black leading-tight italic my-8 z-10">"{currentQuote.def}"</h2>
                                        <button onClick={() => setPage('quiz')} className="bg-white text-indigo-600 w-full py-4 rounded-2xl font-black shadow-lg btn-active z-10">트레이닝 시작</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'quiz' && (
                            <QuizView 
                                q={currentQuote} 
                                onNext={() => getNextQuote(level)} 
                                onFinish={(q, s) => {
                                    const h = [{ date: new Date().toLocaleDateString(), quote: q.ex, def: q.def, score: s }, ...history].slice(0, 50);
                                    setHistory(h);
                                    localStorage.setItem(`wisdomHistory_${user}`, JSON.stringify(h));
                                }} 
                                speak={speak} 
                                onHome={() => setPage('dashboard')} 
                            />
                        )}

                        {page === 'history' && (
                            <div className="space-y-4 animate-fade">
                                <h2 className="text-2xl font-black mb-6 px-2">Learning Records</h2>
                                {history.length === 0 ? <div className="py-20 text-center text-slate-300 font-bold">기록이 아직 없습니다.</div> :
                                history.map((h, i) => (
                                    <div key={i} className="bg-white p-5 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-sm">
                                        <div className="flex-1 pr-4">
                                            <p className="text-[10px] text-slate-300 font-black mb-1">{h.date} • {h.score}</p>
                                            <p className="text-sm font-bold text-slate-800 leading-snug">"{h.def}"</p>
                                        </div>
                                        <button onClick={() => speak(h.quote)} className="p-3 text-indigo-400 bg-indigo-50 rounded-2xl"><i data-lucide="volume-2" size="20"></i></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {page === 'db_status' && (
                            <div className="space-y-6 animate-fade">
                                <div className="flex justify-between items-end px-2">
                                    <h2 className="text-2xl font-black">Database</h2>
                                    <button onClick={fillAllPools} className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">강제 재충전</button>
                                </div>
                                {['Easy', 'Medium', 'Hard'].map(l => (
                                    <div key={l} className="bg-white p-6 rounded-[2.5rem] border border-slate-100">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="font-black text-lg">{l}</span>
                                            <span className={`text-[10px] font-bold px-2 py-1 rounded-lg ${pool[l]?.length > 0 ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-400'}`}>
                                                {pool[l]?.length || 0} 문장 확보됨
                                            </span>
                                        </div>
                                        <div className="space-y-2">
                                            {(pool[l] || []).map((q, idx) => (
                                                <div key={idx} className="text-[10px] p-3 bg-slate-50 rounded-xl text-slate-500 line-clamp-2">
                                                    <strong>{idx+1}.</strong> {q.def}
                                                </div>
                                            ))}
                                            {loadingState[l] && <div className="h-10 shimmer rounded-xl w-full"></div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function QuizView({ q, onNext, onFinish, speak, onHome }) {
            const [input, setInput] = useState('');
            const [checked, setChecked] = useState(false);
            const [result, setResult] = useState([]);
            const shuffledWords = useMemo(() => q?.ex.replace(/[.,!;?]/g, "").split(" ").sort(() => Math.random() - 0.5) || [], [q]);

            const check = () => {
                const target = q.ex.trim().split(/\s+/);
                const userWords = input.trim().split(/\s+/);
                const diff = userWords.map((w, i) => ({ w, ok: w.toLowerCase().replace(/[.,!?]/g, "") === target[i]?.toLowerCase().replace(/[.,!?]/g, "") }));
                onFinish(q, `${Math.round((diff.filter(x => x.ok).length / target.length) * 100)}점`);
                setResult(diff); setChecked(true); speak(q.ex);
            };

            return (
                <div className="bg-white p-7 rounded-[3rem] border shadow-sm animate-fade">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onHome} className="text-slate-300"><i data-lucide="chevron-left"></i></button>
                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Training</span>
                    </div>
                    <h3 className="text-xl font-black mb-6 italic text-slate-800 leading-tight">"{q.def}"</h3>
                    <div className="mb-6 p-4 bg-slate-50 rounded-2xl flex flex-wrap gap-2">
                        {shuffledWords.map((w, i) => <span key={i} className="text-[10px] font-bold bg-white px-2 py-1 rounded-lg border border-slate-100 text-slate-400 uppercase tracking-tighter shadow-sm">{w}</span>)}
                    </div>
                    <textarea value={input} onChange={e => setInput(e.target.value)} className="w-full h-40 p-5 bg-slate-50 rounded-[2rem] mb-4 outline-none text-lg font-medium resize-none border-2 border-transparent focus:border-indigo-100 transition-all" placeholder="영어로 작성하세요..." />
                    {!checked ? (
                        <button onClick={check} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg btn-active">정답 확인</button>
                    ) : (
                        <div className="space-y-4 animate-fade">
                            <div className="p-5 bg-slate-50 rounded-2xl flex flex-wrap gap-2 text-lg">
                                {result.map((item, i) => <span key={i} className={item.ok ? "text-emerald-500 font-bold" : "text-red-500 font-bold underline"}>{item.w}</span>)}
                            </div>
                            <div className="p-5 bg-indigo-50 rounded-[2rem] flex justify-between items-center border border-indigo-100">
                                <p className="text-indigo-900 font-bold text-sm leading-snug">{q.ex}</p>
                                <button onClick={() => speak(q.ex)} className="text-indigo-600 p-2"><i data-lucide="volume-2"></i></button>
                            </div>
                            <button onClick={() => {setChecked(false); setInput(''); onNext()}} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black btn-active">다음 문장</button>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() { useEffect(() => { if (window.lucide) lucide.createIcons(); }); return null; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
