<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Master Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [vocab, setVocab] = useState([]);
            const [settings, setSettings] = useState({ wordGoal: 20, writeGoal: 3 });
            const [progress, setProgress] = useState({ wordsDone: 0, writesDone: 0 });

            useEffect(() => {
                const savedVocab = localStorage.getItem('myVocab');
                const savedSettings = localStorage.getItem('mySettings');
                const savedProgress = localStorage.getItem('myProgress');
                if (savedVocab) setVocab(JSON.parse(savedVocab));
                if (savedSettings) setSettings(JSON.parse(savedSettings));
                if (savedProgress) setProgress(JSON.parse(savedProgress));
            }, []);

            const updateProgress = (newProgress) => {
                setProgress(newProgress);
                localStorage.setItem('myProgress', JSON.stringify(newProgress));
            };

            // 엑셀 파일 처리 로직
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    
                    // 첫 줄이 헤더일 경우 제외하고 파싱 (A: 영단어, B: 뜻, C: 예문)
                    const parsedData = data.slice(1).map(row => ({
                        word: row[0] || '',
                        def: row[1] || '',
                        ex: row[2] || ''
                    })).filter(item => item.word);

                    setVocab(parsedData);
                    localStorage.setItem('myVocab', JSON.stringify(parsedData));
                    alert(`${parsedData.length}개의 단어가 업로드되었습니다!`);
                    setPage('study');
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-indigo-600">English Master</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 border rounded-xl shadow-sm">
                            <i data-lucide={menuOpen ? "x" : "menu"}></i>
                        </button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-16 w-56 bg-white rounded-3xl p-6 shadow-2xl space-y-5" onClick={e => e.stopPropagation()}>
                                <NavItem icon="layout" label="홈" onClick={() => {setPage('dashboard'); setMenuOpen(false)}} />
                                <NavItem icon="settings" label="목표 설정" onClick={() => {setPage('settings'); setMenuOpen(false)}} />
                                <NavItem icon="file-up" label="엑셀 업로드" onClick={() => {setPage('upload'); setMenuOpen(false)}} />
                                <NavItem icon="book-open" label="단어 학습" onClick={() => {setPage('study'); setMenuOpen(false)}} />
                                <NavItem icon="pen-tool" label="작문/첨삭" onClick={() => {setPage('writing'); setMenuOpen(false)}} />
                            </div>
                        </div>
                    )}

                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && <DashboardView settings={settings} progress={progress} />}
                        {page === 'settings' && <SettingsView settings={settings} setSettings={(s) => {setSettings(s); localStorage.setItem('mySettings', JSON.stringify(s)); alert('저장되었습니다.')}} />}
                        {page === 'upload' && (
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                                <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="file-spreadsheet" size="40"></i>
                                </div>
                                <h2 className="text-xl font-bold mb-2">단어장 파일 선택</h2>
                                <p className="text-slate-500 text-sm mb-8">A열:단어, B열:뜻, C열:예문으로 구성된<br/>엑셀(.xlsx) 파일을 선택해 주세요.</p>
                                <label className="block w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold cursor-pointer shadow-lg shadow-indigo-100 active:scale-95 transition">
                                    파일 선택하기
                                    <input type="file" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} className="hidden" />
                                </label>
                            </div>
                        )}
                        {page === 'study' && <StudyView vocab={vocab} progress={progress} updateProgress={updateProgress} />}
                        {page === 'writing' && <WritingView progress={progress} updateProgress={updateProgress} />}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        // --- 컴포넌트들 (대시보드, 학습 등 기존 로직 동일) ---
        function NavItem({ icon, label, onClick }) {
            return (
                <div onClick={onClick} className="flex items-center gap-4 text-slate-700 font-semibold cursor-pointer active:text-indigo-600 transition">
                    <i data-lucide={icon} size="20"></i> {label}
                </div>
            );
        }

        function DashboardView({ settings, progress }) {
            const wordRate = Math.min(100, (progress.wordsDone / settings.wordGoal) * 100);
            const writeRate = Math.min(100, (progress.writesDone / settings.writeGoal) * 100);
            const totalRate = Math.round((wordRate + writeRate) / 2);

            return (
                <div className="space-y-6">
                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                        <div className="relative z-10">
                            <p className="text-indigo-100 font-medium">오늘의 목표 달성도</p>
                            <h2 className="text-5xl font-black mt-2">{totalRate}%</h2>
                            <div className="w-full bg-white/20 h-3 rounded-full mt-6">
                                <div className="bg-white h-3 rounded-full transition-all duration-1000" style={{width: `${totalRate}%`}}></div>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-5 rounded-3xl border shadow-sm">
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-wider">단어 학습</p>
                            <p className="text-2xl font-black mt-1 text-slate-800">{progress.wordsDone} / {settings.wordGoal}</p>
                        </div>
                        <div className="bg-white p-5 rounded-3xl border shadow-sm">
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-wider">문장 작문</p>
                            <p className="text-2xl font-black mt-1 text-slate-800">{progress.writesDone} / {settings.writeGoal}</p>
                        </div>
                    </div>
                </div>
            );
        }

        function SettingsView({ settings, setSettings }) {
            return (
                <div className="bg-white p-8 rounded-[2rem] shadow-sm border space-y-8">
                    <h2 className="text-xl font-bold">🎯 목표량 설정</h2>
                    <div className="space-y-6">
                        <div>
                            <div className="flex justify-between mb-2"><label className="text-sm font-bold text-slate-600">하루 단어 학습</label><span className="text-indigo-600 font-bold">{settings.wordGoal}개</span></div>
                            <input type="range" min="5" max="100" step="5" value={settings.wordGoal} onChange={(e) => setSettings({...settings, wordGoal: e.target.value})} className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                        </div>
                        <div>
                            <div className="flex justify-between mb-2"><label className="text-sm font-bold text-slate-600">하루 작문 첨삭</label><span className="text-indigo-600 font-bold">{settings.writeGoal}회</span></div>
                            <input type="range" min="1" max="10" step="1" value={settings.writeGoal} onChange={(e) => setSettings({...settings, writeGoal: e.target.value})} className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                        </div>
                    </div>
                    <button onClick={() => alert('설정이 저장되었습니다.')} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">설정 완료</button>
                </div>
            );
        }

        function StudyView({ vocab, progress, updateProgress }) {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            if (vocab.length === 0) return <div className="text-center py-20 text-slate-400">파일을 먼저 업로드해주세요!</div>;
            return (
                <div className="flex flex-col items-center">
                    <div onClick={() => setFlipped(!flipped)} className={`w-full aspect-square flex flex-col items-center justify-center p-10 rounded-[3rem] shadow-2xl transition-all duration-500 transform ${flipped ? 'bg-indigo-600 text-white' : 'bg-white border-2'}`}>
                        <h3 className="text-3xl font-black text-center leading-tight">{flipped ? vocab[idx].def : vocab[idx].word}</h3>
                        {flipped && <p className="mt-6 text-indigo-100 italic text-center text-sm">{vocab[idx].ex}</p>}
                    </div>
                    <div className="mt-10 flex items-center gap-6">
                        <button onClick={() => {if(idx > 0) setIdx(idx-1); setFlipped(false)}} className="p-4 bg-white rounded-full shadow-md"><i data-lucide="chevron-left"></i></button>
                        <span className="font-bold text-xl">{idx + 1} / {vocab.length}</span>
                        <button onClick={() => {if(idx < vocab.length-1) {setIdx(idx+1); setFlipped(false); updateProgress({...progress, wordsDone: progress.wordsDone + 1})}}} className="p-4 bg-slate-900 text-white rounded-full shadow-md"><i data-lucide="chevron-right"></i></button>
                    </div>
                </div>
            );
        }

        function WritingView({ progress, updateProgress }) {
            const [text, setText] = useState('');
            const [feedback, setFeedback] = useState(null);
            const handleCheck = () => {
                if(text.length < 5) return alert('더 긴 문장을 입력하세요.');
                setFeedback({ score: 95, correction: "Excellent! 문법이 완벽합니다.", tip: "다음엔 분사구문을 활용해 보세요." });
                updateProgress({...progress, writesDone: progress.writesDone + 1});
            };
            return (
                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <h2 className="text-xl font-bold mb-4">AI 작문 및 평가</h2>
                        <textarea className="w-full h-40 p-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="영작을 입력하세요..." value={text} onChange={(e) => setText(e.target.value)} />
                        <button onClick={handleCheck} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition">평가 및 완료</button>
                    </div>
                    {feedback && <div className="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100 text-emerald-900 font-medium">점수: {feedback.score}점<br/>{feedback.correction}</div>}
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
