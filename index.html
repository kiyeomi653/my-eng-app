<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-wide, user-scalable=no">
    <title>Writing & Vocab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-active:active { transform: scale(0.95); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 900; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const POOL_KEY = 'Writing_Permanent_Pool_Storage';
        const VOCAB_DB_KEY = 'Writing_Vocab_Storage';
        const SETTINGS_KEY = 'Writing_User_Settings';
        const HIST_KEY = 'Writing_Action_History';
        
        const CATS = { Daily: "일상 대화", Wisdom: "명언과 격언", Cinema: "영화 대사" };
        const BIBLE_VERSES = [
            { ref: "Galatians 2:20", niv: "I have been crucified with Christ and I no longer live, but Christ lives in me.", krv: "내가 그리스도와 함께 십자가에 못 박혔나니 그런즉 이제는 내가 사는 것이 아니요 오직 내 안에 그리스도께서 사시는 것이라" },
            { ref: "Romans 12:1", niv: "Therefore, I urge you, brothers and sisters, in view of God’s mercy, to offer your bodies as a living sacrifice.", krv: "그러므로 형제들아 내가 하나님의 모든 자비하심으로 너희를 권하노니 너희 몸을 하나님이 기뻐하시는 거룩한 산 제물로 드리라" },
            { ref: "Matthew 6:33", niv: "But seek first his kingdom and his righteousness, and all these things will be given to you as well.", krv: "그런즉 너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라" }
        ];

        const RAW_VOCABS = [
            { en: "Consistent", ko: "일관된", ex: "He is consistent in his hard work.", exKo: "그는 성실함에 있어 일관적이다." },
            { en: "Inspiration", ko: "영감", ex: "Nature is a great source of inspiration.", exKo: "자연은 영감의 아주 훌륭한 원천이다." },
            { en: "Prioritize", ko: "우선순위를 정하다", ex: "You should prioritize your health.", exKo: "당신은 건강을 최우선으로 해야 합니다." },
            { en: "Ambitious", ko: "야심 있는", ex: "The plan was very ambitious.", exKo: "그 계획은 매우 야심찼다." },
            { en: "Essential", ko: "필수적인", ex: "Water is essential for life.", exKo: "물은 생명에 필수적이다." }
        ];

        function App() {
            const [user, setUser] = useState(localStorage.getItem('currentUser') || '');
            const [page, setPage] = useState('home');
            const [menuOpen, setMenuOpen] = useState(false);
            const [category, setCategory] = useState(null);
            const [pool, setPool] = useState(() => JSON.parse(localStorage.getItem(POOL_KEY)) || { Daily: [], Wisdom: [], Cinema: [] });
            const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { newCardLimit: 10 });
            const [vocabDB, setVocabDB] = useState(() => JSON.parse(localStorage.getItem(VOCAB_DB_KEY)) || []);
            const [writingHistory, setWritingHistory] = useState(() => JSON.parse(localStorage.getItem(HIST_KEY)) || []);
            const [vocabCard, setVocabCard] = useState(null);
            const [showVocabAns, setShowVocabAns] = useState(false);
            const [todayCount, setTodayCount] = useState(0); 
            const [searchTerm, setSearchTerm] = useState('');

            const [bibleVerse, setBibleVerse] = useState(BIBLE_VERSES[0]);
            useEffect(() => { if(page === 'home') setBibleVerse(BIBLE_VERSES[Math.floor(Math.random() * BIBLE_VERSES.length)]); }, [page]);

            useEffect(() => { localStorage.setItem(POOL_KEY, JSON.stringify(pool)); }, [pool]);
            useEffect(() => { localStorage.setItem(VOCAB_DB_KEY, JSON.stringify(vocabDB)); }, [vocabDB]);
            useEffect(() => { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }, [settings]);
            useEffect(() => { localStorage.setItem(HIST_KEY, JSON.stringify(writingHistory)); }, [writingHistory]);

            // 단어 학습 로직 업데이트: 새 단어 완료 후 복습 단어 우선순위 노출
            const getNextVocab = (currentEn = null) => {
                const now = new Date().getTime();
                
                // 1. 복습 큐 확인 (복습 시간이 지났거나 난이도가 낮은 순으로)
                const reviewQueue = vocabDB
                    .filter(v => v.nextReview && v.nextReview <= now && v.en !== currentEn)
                    .sort((a, b) => a.easiness - b.easiness);

                if (reviewQueue.length > 0) {
                    setVocabCard({ ...reviewQueue[0], isReview: true });
                } 
                // 2. 새 단어 학습 (일일 목표량 미달 시)
                else if (todayCount < settings.newCardLimit) {
                    const learnedEn = vocabDB.map(v => v.en);
                    const newCandidate = RAW_VOCABS.find(v => !learnedEn.includes(v.en) && v.en !== currentEn);
                    if (newCandidate) {
                        setVocabCard({ ...newCandidate, interval: 0, easiness: 2.5, repetitions: 0, mode: Math.random() > 0.5 ? 'en-to-ko' : 'ko-to-en', isReview: false });
                    } else {
                        // 새 단어가 더 이상 없으면 기존 단어 중 복습 시점이 가장 가까운 순으로 노출
                        const fallbackQueue = [...vocabDB]
                            .filter(v => v.en !== currentEn)
                            .sort((a, b) => a.nextReview - b.nextReview);
                        setVocabCard(fallbackQueue[0] ? { ...fallbackQueue[0], isReview: true } : null);
                    }
                } 
                // 3. 오늘 분량 완료 후 무한 복습 모드
                else {
                    const extraQueue = [...vocabDB]
                        .filter(v => v.en !== currentEn)
                        .sort((a, b) => a.easiness - b.easiness);
                    setVocabCard(extraQueue[0] ? { ...extraQueue[0], isReview: true } : null);
                }
                setShowVocabAns(false);
            };

            const handleAnkiChoice = (quality) => {
                let { interval, easiness, repetitions, en } = vocabCard;
                if (quality >= 2) {
                    if (repetitions === 0) interval = 1;
                    else if (repetitions === 1) interval = 6;
                    else interval = Math.round(interval * easiness);
                    repetitions++;
                } else { repetitions = 0; interval = 1; }
                easiness = Math.max(1.3, easiness + (0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02)));
                const nextReview = new Date().getTime() + (interval * 24 * 60 * 60 * 1000);
                const updatedCard = { ...vocabCard, interval, easiness, repetitions, nextReview };
                setVocabDB(prev => [...prev.filter(v => v.en !== en), updatedCard]);
                
                if (!vocabCard.isReview) setTodayCount(prev => prev + 1);
                getNextVocab(en);
            };

            const clearWritingHistory = () => {
                if (confirm("모든 작문 기록을 삭제하시겠습니까?")) {
                    setWritingHistory([]);
                }
            };

            const speak = (t) => { if(!t) return; window.speechSynthesis.cancel(); const s = new SpeechSynthesisUtterance(t); s.lang = 'en-US'; s.rate = 0.9; window.speechSynthesis.speak(s); };

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-6">
                    <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl text-center">
                        <h1 className="text-4xl font-black text-indigo-600 mb-8 italic tracking-tighter">Writing</h1>
                        <input id="un" className="w-full p-4 bg-slate-50 border-2 rounded-2xl mb-4 font-bold text-center outline-none" placeholder="이름 입력" />
                        <button onClick={() => {const v=document.getElementById('un').value; if(v){setUser(v); localStorage.setItem('currentUser', v);}}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black btn-active">입장하기</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10 max-w-md mx-auto relative">
                    <header className="p-5 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b shadow-sm">
                        <h1 className="font-black text-2xl text-indigo-600 italic tracking-tighter" onClick={() => setPage('home')}>Writing</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 bg-slate-50 rounded-xl text-slate-600 btn-active"><i data-lucide={menuOpen?"x":"menu"}></i></button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/30 z-40 animate-fade" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-20 w-60 bg-white rounded-[2.5rem] p-6 shadow-2xl space-y-2" onClick={e=>e.stopPropagation()}>
                                <div onClick={()=>{setPage('home');setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="home"></i> 홈</div>
                                <div onClick={()=>{setPage('dashboard');setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="pencil"></i> 작문 학습</div>
                                <div onClick={()=>{setPage('vocab'); getNextVocab(); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="book-open"></i> 단어 학습</div>
                                <div onClick={()=>{setPage('my_vocab'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold text-indigo-600 hover:bg-indigo-50 rounded-2xl cursor-pointer"><i data-lucide="bookmark"></i> 내 단어장</div>
                                <div onClick={()=>{setPage('writing_history'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold text-emerald-600 hover:bg-emerald-50 rounded-2xl cursor-pointer"><i data-lucide="clipboard-list"></i> 작문 기록</div>
                                <div onClick={()=>{setPage('settings'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold text-slate-600 hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="settings"></i> 학습 설정</div>
                                <div onClick={()=>{const pw = prompt("비밀번호"); if(pw==='1234'){setPage('admin_home');setMenuOpen(false);}}} className="flex items-center gap-4 p-4 font-bold text-slate-400 hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="shield"></i> 관리자 설정</div>
                                <hr />
                                <div onClick={()=>{localStorage.removeItem('currentUser'); location.reload();}} className="flex items-center gap-4 p-4 font-bold text-red-400 hover:bg-red-50 rounded-2xl cursor-pointer"><i data-lucide="log-out"></i> 로그아웃</div>
                            </div>
                        </div>
                    )}

                    <main className="p-6">
                        {page === 'home' && (
                            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-8 animate-fade">
                                <div className="bg-white p-10 rounded-[3rem] border-2 border-indigo-50 shadow-xl space-y-6">
                                    <i data-lucide="quote" className="text-indigo-100 mx-auto" size="30"></i>
                                    <p className="text-lg font-black text-indigo-900 leading-relaxed italic mb-4">"{bibleVerse.niv}"</p>
                                    <p className="text-sm font-bold text-slate-500 leading-relaxed px-2">{bibleVerse.krv}</p>
                                    <span className="inline-block bg-indigo-600 text-white px-6 py-2 rounded-full font-bold text-[10px] tracking-wide shadow-md">{bibleVerse.ref}</span>
                                </div>
                            </div>
                        )}

                        {page === 'writing_history' && (
                            <div className="space-y-6 animate-fade">
                                <div className="flex justify-between items-center px-1">
                                    <h2 className="text-2xl font-black italic">Writing History</h2>
                                    <button onClick={clearWritingHistory} className="text-[10px] font-bold text-red-400 border border-red-100 px-3 py-1 rounded-full bg-white shadow-sm">기록 전체 삭제</button>
                                </div>
                                <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                    {writingHistory.length > 0 ? (
                                        <table>
                                            <thead><tr><th>카테고리</th><th>문장</th><th>상태</th></tr></thead>
                                            <tbody>
                                                {writingHistory.map((h, i) => (
                                                    <tr key={i}>
                                                        <td className="text-[9px] font-black text-indigo-500">{CATS[h.cat] || '기타'}</td>
                                                        <td className="font-medium">{h.sentence}</td>
                                                        <td><span className={`px-2 py-1 rounded-full text-[9px] font-bold ${h.correct ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>{h.correct ? '성공' : '오답'}</span></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    ) : (
                                        <div className="p-10 text-center text-slate-400 font-bold">기록된 작문 내역이 없습니다.</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {page === 'vocab' && (
                            <div className="space-y-6 animate-fade">
                                <div className="flex justify-between items-center">
                                    <div className="flex flex-col">
                                        <h2 className="text-2xl font-black italic">Vocab Study</h2>
                                        {vocabCard && <span className={`text-[10px] font-bold ${vocabCard.isReview ? 'text-orange-500' : 'text-indigo-500'}`}>{vocabCard.isReview ? '● 무한 복습 중' : '● 오늘 새 단어'}</span>}
                                    </div>
                                    {vocabCard && !vocabCard.isReview && <div className="text-[10px] font-black text-slate-400 bg-white px-3 py-1 rounded-full border">진행: {todayCount}/{settings.newCardLimit}</div>}
                                </div>
                                {vocabCard ? (
                                    <div className="space-y-8 animate-fade text-center">
                                        <div className="bg-white p-10 rounded-[3.5rem] border shadow-xl min-h-[300px] flex flex-col items-center justify-center space-y-6">
                                            <div className="text-4xl font-black text-indigo-600">{vocabCard.mode === 'en-to-ko' ? vocabCard.en : vocabCard.ko}</div>
                                            {showVocabAns && (
                                                <div className="animate-fade space-y-5">
                                                    <div className="text-xl font-bold text-slate-400">{vocabCard.mode === 'en-to-ko' ? vocabCard.ko : vocabCard.en}</div>
                                                    <button onClick={()=>speak(vocabCard.en)} className="p-3 text-indigo-600 bg-indigo-50 rounded-full"><i data-lucide="volume-2"></i></button>
                                                </div>
                                            )}
                                        </div>
                                        {!showVocabAns ? <button onClick={()=>setShowVocabAns(true)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg">정답 확인</button> : (
                                            <div className="grid grid-cols-2 gap-3">
                                                <button onClick={()=>handleAnkiChoice(0)} className="p-4 bg-red-50 text-red-500 rounded-2xl font-bold">모름</button>
                                                <button onClick={()=>handleAnkiChoice(3)} className="p-4 bg-emerald-50 text-emerald-500 rounded-2xl font-bold">완벽</button>
                                            </div>
                                        )}
                                    </div>
                                ) : <div className="text-center font-black p-10 bg-white rounded-3xl border">단어가 없습니다.</div>}
                            </div>
                        )}

                        {/* 내 단어장, 설정, 관리자 페이지 등은 유지 */}
                        {page === 'my_vocab' && (
                            <div className="space-y-6 animate-fade">
                                <h2 className="text-2xl font-black italic">My Vocabulary</h2>
                                <input className="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-300 font-bold" placeholder="단어 검색..." value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} />
                                <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                    <table>
                                        <thead><tr><th>단어</th><th>복습</th><th>난이도</th></tr></thead>
                                        <tbody>
                                            {filteredVocab.sort((a,b)=>b.nextReview - a.nextReview).map((v, i) => (
                                                <tr key={i}><td className="font-bold">{v.en}<br/><span className="text-[9px] text-slate-400">{v.ko}</span></td><td className="text-center font-bold text-indigo-600">{v.repetitions}회</td><td className="text-slate-400">{v.easiness.toFixed(1)}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        {page === 'settings' && (
                            <div className="space-y-8 animate-fade">
                                <h2 className="text-2xl font-black italic">Study Settings</h2>
                                <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                    <label className="block text-sm font-black text-slate-500 mb-3">하루 새 단어 목표: {settings.newCardLimit}개</label>
                                    <input type="range" min="5" max="100" step="5" value={settings.newCardLimit} onChange={(e)=>setSettings({...settings, newCardLimit: parseInt(e.target.value)})} className="w-full accent-indigo-600" />
                                </div>
                                <button onClick={()=>setPage('home')} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black">저장 완료</button>
                            </div>
                        )}

                        {page === 'admin_home' && (
                            <div className="space-y-6 animate-fade text-center">
                                <h2 className="text-2xl font-black text-indigo-600">Admin Panel</h2>
                                <button onClick={()=>{localStorage.clear(); location.reload();}} className="w-full p-6 bg-red-50 text-red-600 rounded-[2rem] font-black border-2 border-red-100">데이터 완전 초기화</button>
                                <button onClick={()=>setPage('home')} className="w-full p-4 bg-slate-100 rounded-2xl font-bold">홈으로</button>
                            </div>
                        )}

                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <h2 className="text-2xl font-black italic">Writing Study</h2>
                                <div className="grid gap-3">
                                    {Object.keys(CATS).map(c => (
                                        <button key={c} onClick={()=>{setCategory(c);}} className={`py-5 px-8 rounded-2xl font-black border-2 ${category===c?'bg-indigo-600 border-indigo-600 text-white shadow-lg':'bg-white border-slate-50 text-slate-500'}`}>{CATS[c]}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        const filteredVocab = vocabDB.filter(v => v.en.toLowerCase().includes(searchTerm.toLowerCase()) || v.ko.includes(searchTerm));

        function IconUpdate() { useEffect(() => { if (window.lucide) lucide.createIcons(); }); return null; }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
