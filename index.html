<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisdom AI - DB Manager</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const POOL_KEY = 'wisdom_quote_pool_v3';

        function App() {
            const [user, setUser] = useState(localStorage.getItem('currentUser') || '');
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [level, setLevel] = useState(null);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [history, setHistory] = useState([]);
            const [pool, setPool] = useState(() => {
                const saved = localStorage.getItem(POOL_KEY);
                return saved ? JSON.parse(saved) : { Easy: [], Medium: [], Hard: [] };
            });
            const [isFilling, setIsFilling] = useState(false);

            useEffect(() => {
                if (user) {
                    const savedHistory = localStorage.getItem(`wisdomHistory_${user}`);
                    setHistory(savedHistory ? JSON.parse(savedHistory) : []);
                    fillPool();
                }
            }, [user]);

            useEffect(() => {
                localStorage.setItem(POOL_KEY, JSON.stringify(pool));
            }, [pool]);

            const speak = (text) => {
                if(!text) return;
                window.speechSynthesis.cancel();
                const s = new SpeechSynthesisUtterance(text);
                s.lang = 'en-US'; s.rate = 0.85;
                window.speechSynthesis.speak(s);
            };

            const fetchQuote = async (targetLevel) => {
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://zenquotes.io/api/random?cb=${Math.random()}`)}`);
                    const json = await res.json();
                    const data = JSON.parse(json.contents)[0];
                    if(!data || !data.q) return null;

                    const words = data.q.split(" ").length;
                    const isMatch = (targetLevel === 'Easy' && words <= 6) ||
                                 (targetLevel === 'Medium' && words >= 7 && words <= 11) ||
                                 (targetLevel === 'Hard' && words >= 12);

                    if (isMatch) {
                        const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(data.q)}`);
                        const tData = await tRes.json();
                        return { def: tData[0][0][0], ex: data.q, id: Date.now() + Math.random() };
                    }
                } catch (e) { console.error("Fetch Error:", e); return null; }
                return null;
            };

            const fillPool = async () => {
                if(isFilling) return;
                setIsFilling(true);
                const levels = ['Easy', 'Medium', 'Hard'];
                for (const l of levels) {
                    let attempts = 0;
                    while ((pool[l] || []).length < 5 && attempts < 10) {
                        const q = await fetchQuote(l);
                        if (q) {
                            setPool(prev => ({ ...prev, [l]: [...(prev[l] || []), q] }));
                        }
                        attempts++;
                    }
                }
                setIsFilling(false);
            };

            const getNextQuote = (targetLevel) => {
                if (history.length > 3 && Math.random() < 0.15) {
                    const rev = history[Math.floor(Math.random() * history.length)];
                    setCurrentQuote({ def: rev.def, ex: rev.quote, isReview: true });
                    return;
                }

                const currentPool = pool[targetLevel] || [];
                if (currentPool.length > 0) {
                    const next = currentPool[0];
                    setCurrentQuote({ ...next, isReview: false });
                    setPool(prev => ({ ...prev, [targetLevel]: prev[targetLevel].slice(1) }));
                    fillPool();
                } else {
                    // 비상용 기본 문장 (흰 화면 방지)
                    setCurrentQuote({ def: "계속해서 나아가세요.", ex: "Keep moving forward.", isReview: false });
                    fillPool();
                }
            };

            const clearPool = () => {
                const empty = { Easy: [], Medium: [], Hard: [] };
                setPool(empty);
                fillPool();
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-6">
                        <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl text-center">
                            <h1 className="text-3xl font-black text-indigo-600 mb-8 italic tracking-tighter">Wisdom AI</h1>
                            <input id="u_name" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-4 font-bold outline-none text-center" placeholder="이름 입력" />
                            <button onClick={() => {const v=document.getElementById('u_name').value; if(v) setUser(v)}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg btn-active">시작하기</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 max-w-md mx-auto relative">
                    <header className="p-5 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm">
                        <h1 className="font-black text-xl text-indigo-600 flex items-center gap-2" onClick={() => {setPage('dashboard'); setLevel(null);}}>
                            <i data-lucide="zap"></i> {user}
                        </h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 bg-slate-100 rounded-xl text-slate-600 btn-active">
                            <i data-lucide={menuOpen ? "x" : "menu"}></i>
                        </button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40 animate-fade" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-20 w-60 bg-white rounded-[2rem] p-6 shadow-2xl space-y-3" onClick={e => e.stopPropagation()}>
                                <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-4 p-3 font-bold hover:bg-slate-50 rounded-xl cursor-pointer"><i data-lucide="home" size="18"></i> 홈</div>
                                <div onClick={() => {setPage('history'); setMenuOpen(false)}} className="flex items-center gap-4 p-3 font-bold hover:bg-slate-50 rounded-xl cursor-pointer"><i data-lucide="history" size="18"></i> 기록</div>
                                <div onClick={() => {setPage('db_manager'); setMenuOpen(false)}} className="flex items-center gap-4 p-3 font-bold hover:bg-slate-50 rounded-xl cursor-pointer text-indigo-600"><i data-lucide="database" size="18"></i> DB 현황</div>
                                <hr />
                                <div onClick={() => {localStorage.removeItem('currentUser'); setUser('');}} className="flex items-center gap-4 p-3 font-bold text-red-500 hover:bg-red-50 rounded-xl cursor-pointer"><i data-lucide="log-out" size="18"></i> 로그아웃</div>
                            </div>
                        </div>
                    )}

                    <main className="p-6">
                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                                    <div className="flex justify-between items-center mb-4 px-2">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">난이도 선택</h3>
                                        {isFilling && <span className="text-[10px] text-indigo-400 font-bold animate-pulse">DB 충전 중...</span>}
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Easy', 'Medium', 'Hard'].map(l => (
                                            <button key={l} onClick={() => {setLevel(l); getNextQuote(l)}} className={`py-4 rounded-2xl font-black text-xs transition-all btn-active ${level === l ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>
                                                {l === 'Easy' ? '초급' : l === 'Medium' ? '중급' : '고급'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {level && currentQuote && (
                                    <div className="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl min-h-[250px] flex flex-col justify-between animate-fade relative overflow-hidden">
                                        <div className="flex justify-between items-center relative z-10">
                                            <span className="text-[10px] font-black bg-white/20 px-3 py-1 rounded-full uppercase">
                                                {currentQuote.isReview ? 'Review' : `${level} Level`}
                                            </span>
                                            <button onClick={() => getNextQuote(level)}><i data-lucide="refresh-cw" size="18"></i></button>
                                        </div>
                                        <h2 className="text-2xl font-black leading-tight italic my-8 z-10">"{currentQuote.def}"</h2>
                                        <button onClick={() => setPage('quiz')} className="bg-white text-indigo-600 w-full py-4 rounded-2xl font-black shadow-lg btn-active z-10">학습 시작</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'quiz' && (
                            <QuizView 
                                q={currentQuote} 
                                onNext={() => getNextQuote(level)} 
                                onFinish={(q, s) => {
                                    const h = [{ date: new Date().toLocaleDateString(), quote: q.ex, def: q.def, score: s }, ...history].slice(0, 50);
                                    setHistory(h);
                                    localStorage.setItem(`wisdomHistory_${user}`, JSON.stringify(h));
                                }} 
                                speak={speak} 
                                onHome={() => setPage('dashboard')} 
                            />
                        )}
                        
                        {page === 'history' && <HistoryView history={history} user={user} speak={speak} />}

                        {page === 'db_manager' && (
                            <div className="space-y-6 animate-fade">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xl font-black">Database 현황</h2>
                                    <button onClick={clearPool} className="text-[10px] font-bold text-red-400 border border-red-100 px-3 py-1 rounded-lg">DB 초기화</button>
                                </div>
                                {['Easy', 'Medium', 'Hard'].map(l => (
                                    <div key={l} className="bg-white p-5 rounded-3xl border shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="font-black text-indigo-600">{l} Pool</span>
                                            <span className="text-xs font-bold text-slate-400">{pool[l]?.length || 0}개 저장됨</span>
                                        </div>
                                        <div className="space-y-2">
                                            {(pool[l] || []).map((q, idx) => (
                                                <div key={idx} className="text-[11px] p-3 bg-slate-50 rounded-xl text-slate-500 leading-tight">
                                                    <strong>Q.</strong> {q.def}<br/>
                                                    <span className="opacity-60">A. {q.ex}</span>
                                                </div>
                                            ))}
                                            {(!pool[l] || pool[l].length === 0) && <p className="text-center py-4 text-xs text-slate-300">데이터를 불러오는 중입니다...</p>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        // --- 퀴즈 및 히스토리 컴포넌트 ---
        function QuizView({ q, onNext, onFinish, speak, onHome }) {
            const [input, setInput] = useState('');
            const [checked, setChecked] = useState(false);
            const [result, setResult] = useState([]);
            const shuffledWords = useMemo(() => q?.ex.replace(/[.,!;?]/g, "").split(" ").sort(() => Math.random() - 0.5) || [], [q]);

            const check = () => {
                const target = q.ex.trim().split(/\s+/);
                const userWords = input.trim().split(/\s+/);
                const diff = userWords.map((w, i) => ({ w, ok: w.toLowerCase().replace(/[.,!?]/g, "") === target[i]?.toLowerCase().replace(/[.,!?]/g, "") }));
                onFinish(q, `${Math.round((diff.filter(x => x.ok).length / target.length) * 100)}점`);
                setResult(diff); setChecked(true); speak(q.ex);
            };

            return (
                <div className="bg-white p-7 rounded-[3rem] border shadow-sm animate-fade">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onHome} className="text-slate-400"><i data-lucide="chevron-left"></i></button>
                        <span className="text-xs font-black text-indigo-400">Word Training</span>
                    </div>
                    <h3 className="text-xl font-black mb-6 italic text-slate-800">"{q.def}"</h3>
                    <div className="mb-6 p-4 bg-slate-50 rounded-2xl flex flex-wrap gap-2">
                        {shuffledWords.map((w, i) => <span key={i} className="text-[10px] font-bold bg-white px-2 py-1 rounded-lg border border-slate-100 text-slate-400 uppercase">{w}</span>)}
                    </div>
                    <textarea value={input} onChange={e => setInput(e.target.value)} className="w-full h-36 p-5 bg-slate-50 rounded-[2rem] mb-4 outline-none text-lg font-medium resize-none border-2 border-transparent focus:border-indigo-100 transition-all" placeholder="영작 입력..." />
                    {!checked ? (
                        <button onClick={check} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg btn-active">정답 확인</button>
                    ) : (
                        <div className="space-y-4 animate-fade">
                            <div className="p-5 bg-slate-50 rounded-2xl flex flex-wrap gap-2 text-lg">
                                {result.map((item, i) => <span key={i} className={item.ok ? "text-emerald-500 font-bold" : "text-red-500 font-bold underline"}>{item.w}</span>)}
                            </div>
                            <div className="p-5 bg-indigo-50 rounded-[2rem] flex justify-between items-center">
                                <p className="text-indigo-900 font-bold text-sm">{q.ex}</p>
                                <button onClick={() => speak(q.ex)} className="text-indigo-600 p-2"><i data-lucide="volume-2"></i></button>
                            </div>
                            <button onClick={() => {setChecked(false); setInput(''); onNext()}} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black btn-active">다음 문장</button>
                        </div>
                    )}
                </div>
            );
        }

        function HistoryView({ history, user, speak }) {
            return (
                <div className="space-y-4 animate-fade">
                    <h2 className="text-2xl font-black mb-6 flex items-center gap-2 px-2"><i data-lucide="archive"></i> Records</h2>
                    {history.map((h, i) => (
                        <div key={i} className="bg-white p-5 rounded-[2rem] border flex justify-between items-center shadow-sm">
                            <div className="flex-1 pr-4">
                                <p className="text-[10px] text-slate-300 font-black mb-1">{h.date} • {h.score}</p>
                                <p className="text-sm font-bold text-slate-800 leading-snug">"{h.def}"</p>
                            </div>
                            <button onClick={() => speak(h.quote)} className="p-3 text-indigo-400 bg-indigo-50 rounded-2xl hover:bg-indigo-100 transition-colors"><i data-lucide="volume-2" size="20"></i></button>
                        </div>
                    ))}
                </div>
            );
        }

        function IconUpdate() { useEffect(() => { if (window.lucide) lucide.createIcons(); }); return null; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
