<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisdom AI - Category Mode</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-active:active { transform: scale(0.95); }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const POOL_KEY = 'wisdom_v6_category_pool';
        
        // 카테고리 정의
        const CATS = {
            Daily: "일상 대화",
            Wisdom: "명언과 격언",
            Cinema: "영화 대사"
        };

        function App() {
            const [user, setUser] = useState(localStorage.getItem('currentUser') || '');
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [category, setCategory] = useState(null);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem(`wisdomHistory_${user}`)) || []);
            const [pool, setPool] = useState(JSON.parse(localStorage.getItem(POOL_KEY)) || { Daily: [], Wisdom: [], Cinema: [] });
            const [loadingState, setLoadingState] = useState({ Daily: false, Wisdom: false, Cinema: false });

            useEffect(() => {
                localStorage.setItem(POOL_KEY, JSON.stringify(pool));
            }, [pool]);

            useEffect(() => {
                if (user) fillAllPools();
            }, [user]);

            const speak = (text) => {
                if(!text) return;
                window.speechSynthesis.cancel();
                const s = new SpeechSynthesisUtterance(text);
                s.lang = 'en-US'; s.rate = 0.9;
                window.speechSynthesis.speak(s);
            };

            const fetchQuoteFromAPI = async (cat) => {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://zenquotes.io/api/random?cb=${Math.random()}`)}`;
                try {
                    const res = await fetch(proxy);
                    const json = await res.json();
                    const rawData = JSON.parse(json.contents)[0];
                    if(!rawData || !rawData.q) return null;

                    const wordCount = rawData.q.split(" ").length;
                    let isMatch = false;
                    
                    // 카테고리별 필터 로직
                    if (cat === 'Daily') isMatch = (wordCount <= 7); // 일상은 짧은 문장 위주
                    else if (cat === 'Wisdom') isMatch = (wordCount >= 8); // 명언은 긴 문장 위주
                    else if (cat === 'Cinema') isMatch = (wordCount >= 5 && wordCount <= 15); // 영화는 중간 길이

                    if (isMatch) {
                        const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(rawData.q)}`);
                        const tData = await tRes.json();
                        return { def: tData[0][0][0], ex: rawData.q, id: Date.now() + Math.random() };
                    }
                } catch (e) { return null; }
                return null;
            };

            const fillSpecificPool = async (cat) => {
                if (loadingState[cat] || (pool[cat] && pool[cat].length >= 10)) return;
                setLoadingState(prev => ({ ...prev, [cat]: true }));
                
                // 병렬 요청으로 속도 확보
                const results = await Promise.all([fetchQuoteFromAPI(cat), fetchQuoteFromAPI(cat), fetchQuoteFromAPI(cat)]);
                const valid = results.filter(q => q !== null);
                
                if (valid.length > 0) {
                    setPool(prev => ({ ...prev, [cat]: [...(prev[cat] || []), ...valid].slice(0, 15) }));
                }
                setLoadingState(prev => ({ ...prev, [cat]: false }));
            };

            const fillAllPools = () => Object.keys(CATS).forEach(c => fillSpecificPool(c));

            const getNextQuote = (targetCat) => {
                if (history.length > 5 && Math.random() < 0.1) {
                    const rev = history[Math.floor(Math.random() * history.length)];
                    setCurrentQuote({ def: rev.def, ex: rev.quote, isReview: true });
                    return;
                }

                if (pool[targetCat] && pool[targetCat].length > 0) {
                    const next = pool[targetCat][0];
                    setCurrentQuote({ ...next, isReview: false });
                    setPool(prev => ({ ...prev, [targetCat]: prev[targetCat].slice(1) }));
                    fillSpecificPool(targetCat);
                } else {
                    // 즉시 한 개 가져오기 시도
                    fetchQuoteFromAPI(targetCat).then(q => {
                        if(q) setCurrentQuote(q);
                        else setCurrentQuote({def: "잠시 후 다시 시도해주세요.", ex: "Please try again in a moment."});
                    });
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-6">
                        <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl text-center">
                            <h1 className="text-3xl font-black text-indigo-600 mb-8 italic">Wisdom AI</h1>
                            <input id="u_name" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-4 font-bold outline-none text-center" placeholder="이름 입력" onKeyDown={(e)=>e.key==='Enter'&&setUser(e.target.value)} />
                            <button onClick={() => {const v=document.getElementById('u_name').value; if(v) setUser(v)}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black btn-active">시작하기</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 max-w-md mx-auto relative">
                    <header className="p-5 flex justify-between items-center bg-white/90 backdrop-blur-sm sticky top-0 z-50 border-b border-slate-100">
                        <h1 className="font-black text-xl text-indigo-600 flex items-center gap-2" onClick={() => {setPage('dashboard'); setCategory(null);}}>
                            <i data-lucide="zap" fill="currentColor"></i> Wisdom
                        </h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 bg-slate-50 rounded-xl text-slate-600 btn-active">
                            <i data-lucide={menuOpen ? "x" : "menu"}></i>
                        </button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/30 z-40 animate-fade" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-20 w-60 bg-white rounded-[2.5rem] p-6 shadow-2xl space-y-2" onClick={e => e.stopPropagation()}>
                                <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="home" size="18"></i> 홈</div>
                                <div onClick={() => {setPage('history'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="award" size="18"></i> 학습 기록</div>
                                <div onClick={() => {setPage('db_status'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold text-indigo-600 hover:bg-indigo-50 rounded-2xl cursor-pointer"><i data-lucide="database" size="18"></i> 데이터 관리</div>
                                <hr className="my-2 border-slate-50" />
                                <div onClick={() => {localStorage.clear(); location.reload();}} className="flex items-center gap-4 p-4 font-bold text-red-400 hover:bg-red-50 rounded-2xl cursor-pointer"><i data-lucide="refresh-ccw" size="18"></i> 앱 초기화</div>
                            </div>
                        </div>
                    )}

                    <main className="p-6">
                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <h3 className="text-[10px] font-black text-slate-300 uppercase tracking-widest text-center mb-4">학습 카테고리 선택</h3>
                                    <div className="grid grid-cols-1 gap-2">
                                        {Object.keys(CATS).map(c => (
                                            <button key={c} onClick={() => {setCategory(c); getNextQuote(c)}} className={`py-4 px-6 rounded-2xl font-black text-sm transition-all btn-active border-2 flex justify-between items-center ${category === c ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-white border-slate-50 text-slate-500'}`}>
                                                <span>{CATS[c]}</span>
                                                <span className="text-[10px] opacity-60 font-bold">{pool[c]?.length || 0} Ready</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {category && currentQuote && (
                                    <div className="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl min-h-[260px] flex flex-col justify-between animate-fade relative overflow-hidden">
                                        <div className="flex justify-between items-center relative z-10">
                                            <span className="text-[10px] font-black bg-white/20 px-3 py-1 rounded-full uppercase tracking-tighter">
                                                {currentQuote.isReview ? 'Review' : `${category} Mode`}
                                            </span>
                                            <button onClick={() => getNextQuote(category)} className="p-2"><i data-lucide="rotate-cw" size="18"></i></button>
                                        </div>
                                        <h2 className="text-2xl font-black leading-tight italic my-8 z-10">"{currentQuote.def}"</h2>
                                        <button onClick={() => setPage('quiz')} className="bg-white text-indigo-600 w-full py-4 rounded-2xl font-black shadow-lg btn-active z-10">트레이닝 시작</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'quiz' && (
                            <QuizView 
                                q={currentQuote} 
                                onNext={() => getNextQuote(category)} 
                                onFinish={(q, s) => {
                                    const h = [{ date: new Date().toLocaleDateString(), quote: q.ex, def: q.def, score: s }, ...history].slice(0, 50);
                                    setHistory(h);
                                    localStorage.setItem(`wisdomHistory_${user}`, JSON.stringify(h));
                                }} 
                                speak={speak} 
                                onHome={() => setPage('dashboard')} 
                            />
                        )}

                        {page === 'history' && (
                            <div className="space-y-4 animate-fade">
                                <h2 className="text-2xl font-black mb-6 px-2">Records</h2>
                                {history.map((h, i) => (
                                    <div key={i} className="bg-white p-5 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-sm">
                                        <div className="flex-1 pr-4 text-sm font-bold text-slate-800">"{h.def}"</div>
                                        <button onClick={() => speak(h.quote)} className="p-3 text-indigo-400 bg-indigo-50 rounded-2xl"><i data-lucide="volume-2" size="20"></i></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {page === 'db_status' && (
                            <div className="space-y-6 animate-fade">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-2xl font-black">Data Status</h2>
                                    <button onClick={fillAllPools} className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">전체 재충전</button>
                                </div>
                                {Object.keys(CATS).map(c => (
                                    <div key={c} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="font-black text-lg text-slate-800">{CATS[c]}</span>
                                            <button 
                                                onClick={() => fillSpecificPool(c)} 
                                                disabled={loadingState[c]}
                                                className={`text-[10px] font-black px-4 py-2 rounded-xl transition-all ${loadingState[c] ? 'bg-slate-100 text-slate-300' : 'bg-indigo-600 text-white shadow-md btn-active'}`}
                                            >
                                                {loadingState[c] ? '불러오는 중...' : '데이터 불러오기'}
                                            </button>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="text-[10px] text-slate-400 font-bold mb-2">저장된 문장: {pool[c]?.length || 0}개</div>
                                            {(pool[c] || []).slice(0, 3).map((q, idx) => (
                                                <div key={idx} className="text-[10px] p-3 bg-slate-50 rounded-xl text-slate-400 italic line-clamp-1 border border-slate-100">
                                                    "{q.ex}"
                                                </div>
                                            ))}
                                            {loadingState[c] && <div className="h-10 shimmer rounded-xl w-full mt-2"></div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function QuizView({ q, onNext, onFinish, speak, onHome }) {
            const [input, setInput] = useState('');
            const [checked, setChecked] = useState(false);
            const [result, setResult] = useState([]);
            const shuffledWords = useMemo(() => q?.ex.replace(/[.,!;?]/g, "").split(" ").sort(() => Math.random() - 0.5) || [], [q]);

            const check = () => {
                const target = q.ex.trim().split(/\s+/);
                const userWords = input.trim().split(/\s+/);
                const diff = userWords.map((w, i) => ({ w, ok: w.toLowerCase().replace(/[.,!?]/g, "") === target[i]?.toLowerCase().replace(/[.,!?]/g, "") }));
                onFinish(q, `${Math.round((diff.filter(x => x.ok).length / target.length) * 100)}점`);
                setResult(diff); setChecked(true); speak(q.ex);
            };

            return (
                <div className="bg-white p-7 rounded-[3rem] border shadow-sm animate-fade">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onHome} className="text-slate-300"><i data-lucide="chevron-left"></i></button>
                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Training</span>
                    </div>
                    <h3 className="text-xl font-black mb-6 italic text-slate-800 leading-tight">"{q.def}"</h3>
                    <div className="mb-6 p-4 bg-slate-50 rounded-2xl flex flex-wrap gap-2">
                        {shuffledWords.map((w, i) => <span key={i} className="text-[10px] font-bold bg-white px-2 py-1 rounded-lg border border-slate-100 text-slate-400 uppercase shadow-sm">{w}</span>)}
                    </div>
                    <textarea value={input} onChange={e => setInput(e.target.value)} className="w-full h-40 p-5 bg-slate-50 rounded-[2rem] mb-4 outline-none text-lg font-medium resize-none border-2 border-transparent focus:border-indigo-100 transition-all shadow-inner" placeholder="영작 시작..." />
                    {!checked ? (
                        <button onClick={check} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg btn-active">정답 확인</button>
                    ) : (
                        <div className="space-y-4 animate-fade">
                            <div className="p-5 bg-slate-50 rounded-2xl flex flex-wrap gap-2 text-lg">
                                {result.map((item, i) => <span key={i} className={item.ok ? "text-emerald-500 font-bold" : "text-red-500 font-bold underline"}>{item.w}</span>)}
                            </div>
                            <div className="p-5 bg-indigo-50 rounded-[2rem] flex justify-between items-center border border-indigo-100">
                                <p className="text-indigo-900 font-bold text-sm leading-snug">{q.ex}</p>
                                <button onClick={() => speak(q.ex)} className="text-indigo-600 p-2"><i data-lucide="volume-2"></i></button>
                            </div>
                            <button onClick={() => {setChecked(false); setInput(''); onNext()}} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black btn-active">다음 문장</button>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() { useEffect(() => { if (window.lucide) lucide.createIcons(); }); return null; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
