<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Wisdom AI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .diff-red { color: #ef4444; font-weight: bold; text-decoration: underline; }
        .diff-green { color: #10b981; font-weight: bold; }
        .hint-badge { background: #e0e7ff; color: #4338ca; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [loading, setLoading] = useState(true);
            const [progress, setProgress] = useState({ done: 0 });

            // --- 실시간 명언 API 호출 및 자동 번역 기능 ---
            const fetchNewQuote = async () => {
                setLoading(true);
                try {
                    // 1. 영어 명언 가져오기
                    const res = await fetch("https://api.quotable.io/random?minLength=30&maxLength=80");
                    const data = await res.json();
                    
                    // 2. 한국어로 자동 번역하기
                    const transRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(data.content)}`);
                    const transData = await transRes.json();
                    
                    setCurrentQuote({
                        author: data.author,
                        def: transData[0][0][0], // 번역된 뜻
                        ex: data.content        // 원문 영어
                    });
                } catch (e) {
                    console.error("데이터 로드 실패:", e);
                    setCurrentQuote({
                        author: "System",
                        def: "인터넷 연결을 확인해주세요.",
                        ex: "Please check your internet connection."
                    });
                }
                setLoading(false);
            };

            useEffect(() => { fetchNewQuote(); }, []);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const s = new SpeechSynthesisUtterance(text);
                s.lang = 'en-US';
                s.rate = 0.85;
                window.speechSynthesis.speak(s);
            };

            if (loading && !currentQuote) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-indigo-600">
                        <div className="text-center text-white">
                            <div className="animate-spin mb-4 inline-block"><i data-lucide="loader-2" size="48"></i></div>
                            <p className="font-black text-xl">AI가 새로운 명언을 찾는 중...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10">
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-indigo-600 flex items-center gap-2">
                            <i data-lucide="cloud-lightning" size="20"></i> Infinite AI
                        </h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 border rounded-xl active:bg-slate-50">
                            <i data-lucide="menu"></i>
                        </button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-16 w-56 bg-white rounded-3xl p-6 shadow-2xl space-y-4" onClick={e => e.stopPropagation()}>
                                <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-3 font-bold p-2 cursor-pointer"><i data-lucide="layout"></i> 홈</div>
                                <div onClick={() => {setPage('quiz'); setMenuOpen(false)}} className="flex items-center gap-3 font-bold p-2 text-indigo-600 cursor-pointer"><i data-lucide="pencil"></i> 무한 영작 퀴즈</div>
                            </div>
                        </div>
                    )}

                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                                    <p className="opacity-80 font-medium mb-1 text-xs tracking-widest uppercase">Now Loading Wisdom</p>
                                    <h2 className="text-3xl font-black mb-4 leading-tight">"{currentQuote?.def}"</h2>
                                    <p className="text-indigo-200 text-sm font-bold">- {currentQuote?.author}</p>
                                </div>
                                <div className="bg-white p-6 rounded-3xl border shadow-sm text-center">
                                    <p className="text-slate-400 text-xs font-bold mb-1">오늘 완료한 문장</p>
                                    <p className="text-3xl font-black text-slate-800">{progress.done}</p>
                                </div>
                                <button onClick={() => setPage('quiz')} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-lg active:scale-95 transition">학습 시작하기</button>
                            </div>
                        )}

                        {page === 'quiz' && (
                            <QuizView 
                                currentQuote={currentQuote} 
                                fetchNewQuote={fetchNewQuote} 
                                setProgress={setProgress} 
                                speak={speak}
                                loading={loading}
                            />
                        )}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function QuizView({ currentQuote, fetchNewQuote, setProgress, speak, loading }) {
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [showHint, setShowHint] = useState(false);
            const [translated, setTranslated] = useState('');

            const shuffledWords = useMemo(() => {
                if (!currentQuote) return [];
                return currentQuote.ex.replace(/[.,!;]/g, "").split(" ").sort(() => Math.random() - 0.5);
            }, [currentQuote]);

            const handleCheck = async () => {
                if(!input.trim()) return;
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(input)}`);
                    const data = await res.json();
                    setTranslated(data[0][0][0]);
                } catch(e) { setTranslated("번역 오류"); }

                const userWords = input.trim().split(/\s+/);
                const targetWords = currentQuote.ex.trim().split(/\s+/);
                const diff = userWords.map((word, i) => ({
                    word,
                    isCorrect: word.toLowerCase().replace(/[.,!?]/g, "") === targetWords[i]?.toLowerCase().replace(/[.,!?]/g, "")
                }));

                setResult(diff);
                setProgress(p => ({...p, done: p.done + 1}));
                speak(currentQuote.ex);
            };

            const reset = async () => {
                setResult(null);
                setInput('');
                setShowHint(false);
                setTranslated('');
                await fetchNewQuote();
            };

            return (
                <div className="space-y-4 animate-fade">
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <div className="flex justify-between mb-4">
                            <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Random Challenge</span>
                            <button onClick={() => setShowHint(!showHint)} className="text-xs font-bold text-slate-400 flex items-center gap-1">
                                <i data-lucide="lightbulb" size="14"></i> {showHint ? "힌트 끄기" : "힌트 켜기"}
                            </button>
                        </div>
                        
                        <h3 className="text-xl font-bold text-slate-800 mb-2 leading-relaxed">"{currentQuote.def}"</h3>
                        <p className="text-slate-400 text-sm mb-6 font-medium italic">- {currentQuote.author}</p>

                        {showHint && (
                            <div className="mb-6 p-4 bg-indigo-50 rounded-2xl border border-indigo-100 animate-in zoom-in-95">
                                <div className="flex flex-wrap gap-2">
                                    {shuffledWords.map((w, i) => <span key={i} className="hint-badge">{w}</span>)}
                                </div>
                            </div>
                        )}

                        <textarea 
                            className="w-full h-32 p-4 bg-slate-50 border-none rounded-2xl outline-none text-lg focus:ring-2 focus:ring-indigo-500" 
                            placeholder="명언을 영어로 옮겨보세요..." 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)} 
                            disabled={loading}
                        />
                        
                        {!result ? (
                            <button onClick={handleCheck} disabled={loading} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">
                                {loading ? "분석 중..." : "정답 확인"}
                            </button>
                        ) : (
                            <button onClick={reset} disabled={loading} className="w-full mt-4 bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg">
                                {loading ? "새로운 문장 가져오는 중..." : "다음 문장 도전하기"}
                            </button>
                        )}
                    </div>

                    {result && (
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-2xl space-y-4 border-indigo-100 animate-in slide-in-from-bottom-4">
                            <div>
                                <h4 className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">분석 결과</h4>
                                <div className="text-lg flex flex-wrap gap-x-2">
                                    {result.map((item, i) => (
                                        <span key={i} className={item.isCorrect ? "text-emerald-500 font-bold" : "diff-red"}>{item.word}</span>
                                    ))}
                                </div>
                            </div>
                            <div className="p-4 bg-indigo-50 rounded-2xl">
                                <div className="flex justify-between items-center mb-1">
                                    <h4 className="text-[10px] font-black text-indigo-400 uppercase">원문 명언</h4>
                                    <button onClick={() => speak(currentQuote.ex)}><i data-lucide="volume-2" size="18" className="text-indigo-600"></i></button>
                                </div>
                                <p className="text-indigo-900 font-black leading-relaxed">{currentQuote.ex}</p>
                            </div>
                            <div className="pt-2">
                                <h4 className="text-[10px] font-black text-slate-300 mb-1 uppercase">내가 쓴 문장의 의미</h4>
                                <p className="text-slate-600 font-medium italic text-sm">"{translated}"</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
