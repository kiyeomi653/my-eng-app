<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisdom AI - Ultra Fast</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .animate-fade { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 저장소 키 설정
        const POOL_KEY = 'wisdom_quote_pool';

        function App() {
            const [user, setUser] = useState(localStorage.getItem('currentUser') || '');
            const [page, setPage] = useState('dashboard');
            const [currentQuote, setCurrentQuote] = useState(null);
            const [level, setLevel] = useState(null);
            const [history, setHistory] = useState([]);
            const [pool, setPool] = useState(JSON.parse(localStorage.getItem(POOL_KEY)) || { Easy: [], Medium: [], Hard: [] });

            // 1. 앱 실행 시 로컬 히스토리 로드 및 풀 충전 시작
            useEffect(() => {
                if (user) {
                    const savedHistory = localStorage.getItem(`wisdomHistory_${user}`);
                    setHistory(savedHistory ? JSON.parse(savedHistory) : []);
                    fillPool(); // 부족한 문장 채우기
                }
            }, [user]);

            // 2. 풀(Pool)이 변경될 때마다 로컬 스토리지에 영구 저장
            useEffect(() => {
                localStorage.setItem(POOL_KEY, JSON.stringify(pool));
            }, [pool]);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const s = new SpeechSynthesisUtterance(text);
                s.lang = 'en-US'; s.rate = 0.9;
                window.speechSynthesis.speak(s);
            };

            // 3. 단일 문장 API 호출 (최적화)
            const fetchQuote = async (targetLevel) => {
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://zenquotes.io/api/random?cb=${Math.random()}`)}`);
                    const data = JSON.parse((await res.json()).contents)[0];
                    const words = data.q.split(" ").length;

                    let isMatch = (targetLevel === 'Easy' && words <= 6) ||
                                 (targetLevel === 'Medium' && words >= 7 && words <= 11) ||
                                 (targetLevel === 'Hard' && words >= 12);

                    if (isMatch) {
                        const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(data.q)}`);
                        const tData = await tRes.json();
                        return { def: tData[0][0][0], ex: data.q };
                    }
                } catch (e) { return null; }
                return null;
            };

            // 4. 부족한 문장 미리 채우기 (앱 비활성 상태 보완)
            const fillPool = async () => {
                const levels = ['Easy', 'Medium', 'Hard'];
                levels.forEach(async (l) => {
                    while (pool[l].length < 5) { // 난이도별 5개씩 유지
                        const q = await fetchQuote(l);
                        if (q) {
                            setPool(prev => ({ ...prev, [l]: [...prev[l], q] }));
                        }
                    }
                });
            };

            // 5. 문장 교체 (풀에서 즉시 추출)
            const getNextQuote = (targetLevel) => {
                // 복습 로직 (15% 확률)
                if (history.length > 3 && Math.random() < 0.15) {
                    const rev = history[Math.floor(Math.random() * history.length)];
                    setCurrentQuote({ ...rev, ex: rev.quote, isReview: true });
                    return;
                }

                if (pool[targetLevel].length > 0) {
                    const next = pool[targetLevel][0];
                    setCurrentQuote({ ...next, isReview: false });
                    // 사용한 문장 제거 및 즉시 백그라운드 보충
                    setPool(prev => ({ ...prev, [targetLevel]: prev[targetLevel].slice(1) }));
                    fillPool(); 
                } else {
                    // 풀이 비었을 경우 비상 호출
                    fetchQuote(targetLevel).then(q => {
                        if (q) setCurrentQuote(q);
                    });
                }
            };

            const saveResult = (quote, score) => {
                const newHistory = [{ date: new Date().toLocaleDateString(), quote: quote.ex, def: quote.def, score }, ...history].slice(0, 50);
                setHistory(newHistory);
                localStorage.setItem(`wisdomHistory_${user}`, JSON.stringify(newHistory));
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-6">
                        <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center">
                            <h1 className="text-2xl font-black text-indigo-600 mb-6">Wisdom AI</h1>
                            <input id="u" className="w-full p-4 bg-slate-100 rounded-2xl mb-4 font-bold outline-none" placeholder="이름 입력" />
                            <button onClick={() => {const v=document.getElementById('u').value; if(v) setUser(v)}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg btn-active">시작하기</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 max-w-md mx-auto">
                    <header className="p-6 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
                        <span className="font-black text-indigo-600 flex items-center gap-2" onClick={() => setPage('dashboard')}><i data-lucide="zap"></i> {user}</span>
                        <div className="flex gap-4">
                            <i data-lucide="history" onClick={() => setPage('history')} className="cursor-pointer text-slate-400"></i>
                            <i data-lucide="log-out" onClick={() => {localStorage.removeItem('currentUser'); setUser('')}} className="cursor-pointer text-red-300"></i>
                        </div>
                    </header>

                    <main className="p-6">
                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <div className="bg-white p-6 rounded-[2rem] border">
                                    <p className="text-[10px] font-black text-slate-400 mb-4 text-center uppercase tracking-tighter">준비된 문장: 초급({pool.Easy.length}) 중급({pool.Medium.length}) 고급({pool.Hard.length})</p>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Easy', 'Medium', 'Hard'].map(l => (
                                            <button key={l} onClick={() => {setLevel(l); getNextQuote(l)}} className={`py-4 rounded-2xl font-black text-xs transition-all btn-active ${level === l ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>
                                                {l === 'Easy' ? '초급' : l === 'Medium' ? '중급' : '고급'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {level && currentQuote && (
                                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl min-h-[220px] flex flex-col justify-between animate-fade">
                                        <div className="flex justify-between items-start">
                                            <span className="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md">{currentQuote.isReview ? '🔄 복습' : '🆕 신규'}</span>
                                            <i data-lucide="refresh-cw" size="18" onClick={() => getNextQuote(level)} className="cursor-pointer"></i>
                                        </div>
                                        <h2 className="text-2xl font-black italic my-6 leading-tight">"{currentQuote.def}"</h2>
                                        <button onClick={() => setPage('quiz')} className="bg-white text-indigo-600 w-full py-4 rounded-2xl font-black shadow-md btn-active">학습 시작</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'quiz' && (
                            <QuizView 
                                q={currentQuote} 
                                onNext={() => getNextQuote(level)} 
                                onFinish={saveResult} 
                                speak={speak}
                                onHome={() => setPage('dashboard')}
                            />
                        )}
                        
                        {page === 'history' && (
                            <div className="space-y-4 animate-fade">
                                <h2 className="text-xl font-black mb-4">학습 기록</h2>
                                {history.map((h, i) => (
                                    <div key={i} className="bg-white p-5 rounded-3xl border flex justify-between items-center">
                                        <div className="flex-1 pr-4">
                                            <p className="text-[10px] text-slate-300 font-bold">{h.date}</p>
                                            <p className="text-sm font-bold text-slate-800">"{h.def}"</p>
                                        </div>
                                        <i data-lucide="volume-2" onClick={() => speak(h.quote)} className="text-indigo-400 cursor-pointer p-2"></i>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function QuizView({ q, onNext, onFinish, speak, onHome }) {
            const [input, setInput] = useState('');
            const [checked, setChecked] = useState(false);
            const [result, setResult] = useState([]);

            const check = () => {
                const target = q.ex.trim().split(/\s+/);
                const user = input.trim().split(/\s+/);
                const diff = user.map((w, i) => ({ w, ok: w.toLowerCase().replace(/[.,!?]/g, "") === target[i]?.toLowerCase().replace(/[.,!?]/g, "") }));
                const score = `${Math.round((diff.filter(x => x.ok).length / target.length) * 100)}점`;
                setResult(diff); setChecked(true); onFinish(q, score); speak(q.ex);
            };

            return (
                <div className="bg-white p-6 rounded-[2rem] border shadow-sm animate-fade">
                    <div className="flex justify-between items-center mb-6">
                        <i data-lucide="arrow-left" onClick={onHome} className="cursor-pointer text-slate-400"></i>
                        <span className="text-xs font-black text-indigo-500 uppercase">Quiz Time</span>
                    </div>
                    <h3 className="text-xl font-black mb-6 italic">"{q.def}"</h3>
                    <textarea value={input} onChange={e => setInput(e.target.value)} className="w-full h-32 p-4 bg-slate-50 rounded-2xl mb-4 outline-none text-lg font-medium" placeholder="영작을 입력하세요..." />
                    
                    {!checked ? (
                        <button onClick={check} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black btn-active">정답 확인</button>
                    ) : (
                        <div className="space-y-4 animate-fade">
                            <div className="p-4 bg-slate-50 rounded-2xl flex flex-wrap gap-2 text-lg">
                                {result.map((item, i) => <span key={i} className={item.ok ? "text-emerald-500 font-bold" : "text-red-500 font-bold underline"}>{item.w}</span>)}
                            </div>
                            <div className="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 flex justify-between items-center">
                                <p className="text-indigo-900 font-bold text-sm">{q.ex}</p>
                                <i data-lucide="volume-2" onClick={() => speak(q.ex)} className="text-indigo-600 cursor-pointer"></i>
                            </div>
                            <button onClick={() => {setChecked(false); setInput(''); onNext()}} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black btn-active">다음 문장</button>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() { useEffect(() => { if (window.lucide) lucide.createIcons(); }); return null; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
