<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Writing & Vocab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-active:active { transform: scale(0.95); }
        .tooltip-box { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; white-space: nowrap; z-index: 100; margin-bottom: 5px; }
        .tooltip-box::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const POOL_KEY = 'Writing_Permanent_Pool_Storage';
        const USER_DB_KEY = 'Writing_Permanent_User_Registry';
        const VOCAB_DB_KEY = 'Writing_Vocab_Storage';
        const SETTINGS_KEY = 'Writing_User_Settings';
        
        const CATS = { Daily: "일상 대화", Wisdom: "명언과 격언", Cinema: "영화 대사" };
        const BIBLE_VERSES = [
            { ref: "Galatians 2:20", niv: "I have been crucified with Christ and I no longer live, but Christ lives in me.", krv: "내가 그리스도와 함께 십자가에 못 박혔나니 그런즉 이제는 내가 사는 것이 아니요 오직 내 안에 그리스도께서 사시는 것이라" },
            { ref: "Romans 12:1", niv: "Therefore, I urge you, brothers and sisters, in view of God’s mercy, to offer your bodies as a living sacrifice.", krv: "그러므로 형제들아 내가 하나님의 모든 자비하심으로 너희를 권하노니 너희 몸을 하나님이 기뻐하시는 거룩한 산 제물로 드리라" },
            { ref: "Matthew 6:33", niv: "But seek first his kingdom and his righteousness, and all these things will be given to you as well.", krv: "그런즉 너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라" }
        ];

        // 샘플 단어 원천 데이터
        const RAW_VOCABS = [
            { en: "Consistent", ko: "일관된", ex: "He is consistent in his hard work.", exKo: "그는 성실함에 있어 일관적이다." },
            { en: "Inspiration", ko: "영감", ex: "Nature is a great source of inspiration.", exKo: "자연은 영감의 아주 훌륭한 원천이다." },
            { en: "Prioritize", ko: "우선순위를 정하다", ex: "You should prioritize your health.", exKo: "당신은 건강을 최우선으로 해야 합니다." },
            { en: "Ambitious", ko: "야심 있는", ex: "The plan was very ambitious.", exKo: "그 계획은 매우 야심찼다." },
            { en: "Essential", ko: "필수적인", ex: "Water is essential for life.", exKo: "물은 생명에 필수적이다." },
            { en: "Sufficient", ko: "충분한", ex: "We have sufficient evidence.", exKo: "우리는 충분한 증거를 가지고 있다." },
            { en: "Advocate", ko: "지지하다", ex: "They advocate for human rights.", exKo: "그들은 인권을 옹호한다." }
        ];

        function App() {
            const [user, setUser] = useState(localStorage.getItem('currentUser') || '');
            const [page, setPage] = useState('home');
            const [menuOpen, setMenuOpen] = useState(false);
            const [category, setCategory] = useState(null);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem(`writingHistory_${user}`)) || []);
            const [pool, setPool] = useState(() => JSON.parse(localStorage.getItem(POOL_KEY)) || { Daily: [], Wisdom: [], Cinema: [] });
            
            // --- 단어/설정 관련 상태 ---
            const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { newCardLimit: 5 });
            const [vocabDB, setVocabDB] = useState(() => JSON.parse(localStorage.getItem(VOCAB_DB_KEY)) || []);
            const [vocabCard, setVocabCard] = useState(null);
            const [showVocabAns, setShowVocabAns] = useState(false);
            const [todayCount, setTodayCount] = useState(0); // 오늘 학습한 새 단어 수

            useEffect(() => { localStorage.setItem(POOL_KEY, JSON.stringify(pool)); }, [pool]);
            useEffect(() => { localStorage.setItem(VOCAB_DB_KEY, JSON.stringify(vocabDB)); }, [vocabDB]);
            useEffect(() => { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }, [settings]);

            const getNextVocab = () => {
                const now = new Date().getTime();
                
                // 1. 복습할 단어가 있는지 확인 (복습 예정일이 지났고 학습 이력이 있는 것)
                const reviewQueue = vocabDB.filter(v => v.nextReview && v.nextReview <= now);
                
                if (reviewQueue.length > 0) {
                    setVocabCard(reviewQueue[0]);
                } 
                // 2. 새 단어 학습 (오늘 제한량 확인)
                else if (todayCount < settings.newCardLimit) {
                    // DB에 없는 새로운 단어 추출
                    const learnedEn = vocabDB.map(v => v.en);
                    const newCandidate = RAW_VOCABS.find(v => !learnedEn.includes(v.en));
                    
                    if (newCandidate) {
                        setVocabCard({ ...newCandidate, interval: 0, easiness: 2.5, repetitions: 0, mode: Math.random() > 0.5 ? 'en-to-ko' : 'ko-to-en' });
                    } else {
                        setVocabCard(null); // 더 이상 학습할 단어 없음
                    }
                } else {
                    setVocabCard(null); // 오늘 목표 달성
                }
                setShowVocabAns(false);
            };

            const handleAnkiChoice = (quality) => {
                // quality: 0(모름), 1(헷갈림), 2(안다), 3(매우쉽다)
                let { interval, easiness, repetitions } = vocabCard;

                if (quality >= 2) { // 맞춘 경우
                    if (repetitions === 0) interval = 1;
                    else if (repetitions === 1) interval = 6;
                    else interval = Math.round(interval * easiness);
                    repetitions++;
                } else { // 틀리거나 헷갈린 경우
                    repetitions = 0;
                    interval = 1;
                }

                // 난이도 조절 (Anki 알고리즘 변형)
                easiness = easiness + (0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02));
                if (easiness < 1.3) easiness = 1.3;

                const nextReview = new Date().getTime() + (interval * 24 * 60 * 60 * 1000);
                
                const updatedCard = { ...vocabCard, interval, easiness, repetitions, nextReview };
                
                // DB 업데이트
                setVocabDB(prev => {
                    const filtered = prev.filter(v => v.en !== vocabCard.en);
                    return [...filtered, updatedCard];
                });

                if (vocabCard.repetitions === 0) setTodayCount(prev => prev + 1);
                getNextVocab();
            };

            const speak = (t) => { if(!t) return; window.speechSynthesis.cancel(); const s = new SpeechSynthesisUtterance(t); s.lang = 'en-US'; s.rate = 0.9; window.speechSynthesis.speak(s); };

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-6">
                    <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl text-center">
                        <h1 className="text-4xl font-black text-indigo-600 mb-8 italic tracking-tighter">Writing</h1>
                        <input id="un" className="w-full p-4 bg-slate-50 border-2 rounded-2xl mb-4 font-bold text-center outline-none" placeholder="이름 입력" />
                        <button onClick={() => {const v=document.getElementById('un').value; if(v){setUser(v); localStorage.setItem('currentUser', v);}}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black btn-active">입장하기</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10 max-w-md mx-auto relative">
                    <header className="p-5 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b shadow-sm">
                        <h1 className="font-black text-2xl text-indigo-600 italic tracking-tighter" onClick={() => setPage('home')}>Writing</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 bg-slate-50 rounded-xl text-slate-600 btn-active"><i data-lucide={menuOpen?"x":"menu"}></i></button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/30 z-40 animate-fade" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-20 w-60 bg-white rounded-[2.5rem] p-6 shadow-2xl space-y-2" onClick={e=>e.stopPropagation()}>
                                <div onClick={()=>{setPage('home');setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="home"></i> 홈 (성경)</div>
                                <div onClick={()=>{setPage('dashboard');setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="pencil"></i> 작문 학습</div>
                                <div onClick={()=>{setPage('vocab'); getNextVocab(); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="book-open"></i> 단어 학습</div>
                                <div onClick={()=>{setPage('settings'); setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold text-slate-600 hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="settings"></i> 학습 설정</div>
                                <div onClick={()=>{setPage('history');setMenuOpen(false)}} className="flex items-center gap-4 p-4 font-bold hover:bg-slate-50 rounded-2xl cursor-pointer"><i data-lucide="award"></i> 기록</div>
                                <hr />
                                <div onClick={()=>{localStorage.removeItem('currentUser'); location.reload();}} className="flex items-center gap-4 p-4 font-bold text-red-400 hover:bg-red-50 rounded-2xl cursor-pointer"><i data-lucide="log-out"></i> 로그아웃</div>
                            </div>
                        </div>
                    )}

                    <main className="p-6">
                        {page === 'home' && (
                            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-8 animate-fade">
                                <div className="bg-white p-10 rounded-[3rem] border-2 border-indigo-50 shadow-xl space-y-6">
                                    <i data-lucide="quote" className="text-indigo-100 mx-auto" size="30"></i>
                                    <div>
                                        <p className="text-lg font-black text-indigo-900 leading-relaxed italic mb-4">"{BIBLE_VERSES[0].niv}"</p>
                                        <p className="text-sm font-bold text-slate-500 leading-relaxed px-2">{BIBLE_VERSES[0].krv}</p>
                                    </div>
                                    <span className="inline-block bg-indigo-600 text-white px-6 py-2 rounded-full font-bold text-[10px] tracking-wide shadow-md">{BIBLE_VERSES[0].ref}</span>
                                </div>
                            </div>
                        )}

                        {page === 'settings' && (
                            <div className="space-y-8 animate-fade">
                                <h2 className="text-2xl font-black italic">Study Settings</h2>
                                <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-6">
                                    <div>
                                        <label className="block text-sm font-black text-slate-500 mb-3">하루 새 단어 학습량</label>
                                        <div className="flex items-center gap-4">
                                            <input type="range" min="1" max="20" value={settings.newCardLimit} onChange={(e)=>setSettings({...settings, newCardLimit: parseInt(e.target.value)})} className="flex-1 accent-indigo-600" />
                                            <span className="font-black text-indigo-600 text-xl w-8 text-center">{settings.newCardLimit}</span>
                                        </div>
                                        <p className="text-[10px] text-slate-400 mt-2">* 설정한 개수만큼 새 단어를 먼저 보여준 뒤 복습이 시작됩니다.</p>
                                    </div>
                                </div>
                                <button onClick={()=>setPage('home')} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg">저장 및 나가기</button>
                            </div>
                        )}

                        {page === 'vocab' && (
                            <div className="space-y-6 animate-fade text-center">
                                <h2 className="text-2xl font-black italic">Vocab (Anki)</h2>
                                {vocabCard ? (
                                    <div className="space-y-8">
                                        <div className="bg-white p-10 rounded-[3.5rem] border shadow-xl min-h-[350px] flex flex-col items-center justify-center space-y-6">
                                            <div className="text-4xl font-black text-indigo-600">
                                                {vocabCard.mode === 'en-to-ko' ? vocabCard.en : vocabCard.ko}
                                            </div>
                                            {showVocabAns && (
                                                <div className="animate-fade space-y-5 w-full">
                                                    <div className="text-xl font-bold text-slate-400">{vocabCard.mode === 'en-to-ko' ? vocabCard.ko : vocabCard.en}</div>
                                                    <div className="space-y-1">
                                                        <div className="text-sm font-medium italic text-slate-600 italic">"{vocabCard.ex}"</div>
                                                        <div className="text-[11px] font-bold text-indigo-400">{vocabCard.exKo}</div>
                                                    </div>
                                                    <button onClick={()=>speak(vocabCard.en)} className="p-3 text-indigo-600 bg-indigo-50 rounded-full"><i data-lucide="volume-2"></i></button>
                                                </div>
                                            )}
                                        </div>
                                        {!showVocabAns ? (
                                            <button onClick={()=>setShowVocabAns(true)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg btn-active">정답 확인</button>
                                        ) : (
                                            <div className="grid grid-cols-2 gap-3 animate-fade">
                                                <button onClick={()=>handleAnkiChoice(0)} className="p-4 bg-red-50 text-red-500 rounded-2xl font-bold text-xs btn-active border border-red-100">전혀 모르겠다</button>
                                                <button onClick={()=>handleAnkiChoice(1)} className="p-4 bg-orange-50 text-orange-500 rounded-2xl font-bold text-xs btn-active border border-orange-100">헷갈린다</button>
                                                <button onClick={()=>handleAnkiChoice(2)} className="p-4 bg-blue-50 text-blue-500 rounded-2xl font-bold text-xs btn-active border border-blue-100">안다</button>
                                                <button onClick={()=>handleAnkiChoice(3)} className="p-4 bg-emerald-50 text-emerald-500 rounded-2xl font-bold text-xs btn-active border border-emerald-100">매우 쉽다</button>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="bg-white p-10 rounded-[3rem] border text-center space-y-4 shadow-sm">
                                        <div className="text-5xl">🎉</div>
                                        <p className="font-black text-slate-600 text-lg">오늘의 학습 완료!</p>
                                        <p className="text-sm text-slate-400 font-medium">새 단어 학습량이나 복습 예정 단어가 없습니다.</p>
                                        <button onClick={()=>setPage('home')} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-4">홈으로 가기</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-fade">
                                <h2 className="text-2xl font-black italic px-2">Writing Study</h2>
                                <div className="grid gap-3">
                                    {Object.keys(CATS).map(c => (
                                        <button key={c} onClick={()=>{
                                            setCategory(c); 
                                            if(!currentQuote && pool[c]?.length > 0) {
                                                setCurrentQuote(pool[c][0]);
                                                setPool(p=>({...p, [c]:p[c].slice(1)}));
                                            }
                                        }} className={`py-5 px-8 rounded-2xl font-black transition-all btn-active border-2 ${category===c?'bg-indigo-600 border-indigo-600 text-white shadow-lg':'bg-white border-slate-50 text-slate-500'}`}>{CATS[c]}</button>
                                    ))}
                                </div>
                                {category && currentQuote && (
                                    <div className="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl animate-fade">
                                        <h2 className="text-2xl font-black leading-tight italic mb-8">"{currentQuote.def}"</h2>
                                        <button onClick={()=>setPage('quiz')} className="bg-white text-indigo-600 w-full py-4 rounded-2xl font-black shadow-lg btn-active">훈련 시작</button>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {/* QuizView, History, Admin 등 기존 컴포넌트 생략 (동일 유지) */}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function IconUpdate() { useEffect(() => { if (window.lucide) lucide.createIcons(); }); return null; }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
