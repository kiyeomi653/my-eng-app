<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart English Learning</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .flip-card { perspective: 1000px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [vocab, setVocab] = useState([]);
            const [rawText, setRawText] = useState('');

            // 로컬 스토리지에서 단어장 불러오기 (아이폰 사파리 새로고침 대비)
            useEffect(() => {
                const saved = localStorage.getItem('myVocab');
                if (saved) setVocab(JSON.parse(saved));
            }, []);

            const handleUpload = () => {
                const rows = rawText.trim().split('\n');
                const data = rows.map(row => {
                    const [word, def, ex] = row.split('\t');
                    return { word: word || '', def: def || '', ex: ex || '' };
                });
                if (data.length > 0 && data[0].word) {
                    setVocab(data);
                    localStorage.setItem('myVocab', JSON.stringify(data));
                    alert('단어장이 저장되었습니다!');
                    setPage('study');
                } else {
                    alert('형식이 올바르지 않습니다. (단어[Tab]뜻[Tab]예문)');
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* 상단 헤더 */}
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-blue-600">Smart English</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2">
                            <i data-lucide={menuOpen ? "x" : "menu"}></i>
                        </button>
                    </header>

                    {/* 메뉴 레이어 */}
                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/50 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-0 top-0 h-full w-64 bg-white p-8 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <nav className="space-y-6 mt-10 text-lg font-medium">
                                    <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-3"><i data-lucide="layout"></i> 대시보드</div>
                                    <div onClick={() => {setPage('upload'); setMenuOpen(false)}} className="flex items-center gap-3"><i data-lucide="upload"></i> 단어장 업로드</div>
                                    <div onClick={() => {setPage('study'); setMenuOpen(false)}} className="flex items-center gap-3"><i data-lucide="book-open"></i> 단어 학습</div>
                                    <div onClick={() => {setPage('writing'); setMenuOpen(false)}} className="flex items-center gap-3"><i data-lucide="edit-3"></i> 작문 및 첨삭</div>
                                </nav>
                            </div>
                        </div>
                    )}

                    {/* 메인 콘텐츠 */}
                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && <Dashboard />}
                        {page === 'upload' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                <h2 className="text-xl font-bold mb-4">단어장 업로드</h2>
                                <textarea 
                                    className="w-full h-48 p-4 bg-slate-50 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Apple(탭)사과(탭)I like apples."
                                    value={rawText}
                                    onChange={(e) => setRawText(e.target.value)}
                                />
                                <button onClick={handleUpload} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">저장 및 학습시작</button>
                            </div>
                        )}
                        {page === 'study' && <StudyView vocab={vocab} />}
                        {page === 'writing' && <WritingView />}
                    </main>

                    {/* 아이콘 업데이트용 */}
                    <IconUpdater />
                </div>
            );
        }

        function Dashboard() {
            return (
                <div className="space-y-6">
                    <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2rem] text-white shadow-lg">
                        <p className="opacity-80">나의 현재 수준</p>
                        <h2 className="text-3xl font-bold mt-1">Intermediate</h2>
                        <div className="w-full bg-white/20 h-2 rounded-full mt-6">
                            <div className="bg-white h-2 rounded-full w-[60%]"></div>
                        </div>
                        <p className="text-sm mt-2 text-right opacity-80 text-white">다음 레벨까지 40%</p>
                    </div>
                    <div className="bg-white p-6 rounded-2xl border border-slate-100">
                        <h3 className="font-bold flex items-center gap-2 mb-4"><i data-lucide="calendar" className="text-blue-500"></i> 오늘의 학습 스케줄</h3>
                        <div className="space-y-3 text-slate-600">
                            <div className="flex items-center gap-2"><i data-lucide="check-circle-2" size="16" className="text-green-500"></i> 단어 15개 외우기</div>
                            <div className="flex items-center gap-2"><i data-lucide="circle" size="16" className="text-slate-300"></i> 짧은 일기 작성</div>
                        </div>
                    </div>
                </div>
            );
        }

        function StudyView({ vocab }) {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);

            if (vocab.length === 0) return <div className="text-center py-20">업로드된 단어가 없습니다.</div>;

            return (
                <div className="flex flex-col items-center pt-10">
                    <div onClick={() => setFlipped(!flipped)} className={`w-full aspect-square flex flex-col items-center justify-center p-10 rounded-[2.5rem] shadow-xl transition-all duration-500 text-center ${flipped ? 'bg-blue-600 text-white' : 'bg-white border'}`}>
                        <h3 className="text-4xl font-bold mb-4">{flipped ? vocab[idx].def : vocab[idx].word}</h3>
                        {flipped && <p className="text-lg opacity-80 leading-relaxed italic px-4">{vocab[idx].ex}</p>}
                    </div>
                    <div className="flex gap-10 mt-12 items-center">
                        <button onClick={() => {setIdx(Math.max(0, idx-1)); setFlipped(false)}} className="p-4 bg-white rounded-full shadow-md"><i data-lucide="chevron-left"></i></button>
                        <span className="font-bold text-xl">{idx + 1} / {vocab.length}</span>
                        <button onClick={() => {setIdx(Math.min(vocab.length-1, idx+1)); setFlipped(false)}} className="p-4 bg-slate-800 text-white rounded-full shadow-md"><i data-lucide="chevron-right"></i></button>
                    </div>
                </div>
            );
        }

        function WritingView() {
            return (
                <div className="bg-white p-6 rounded-2xl border">
                    <h2 className="text-xl font-bold mb-4">AI 작문 연습</h2>
                    <textarea className="w-full h-40 p-4 bg-slate-50 border rounded-xl mb-4 focus:outline-none" placeholder="영작을 해보세요..."></textarea>
                    <div className="p-4 bg-amber-50 border-l-4 border-amber-400 rounded-r-xl">
                        <p className="text-sm text-amber-800 font-bold">피드백:</p>
                        <p className="text-sm text-amber-700 italic">문장을 입력하면 이곳에서 첨삭 내용을 확인할 수 있습니다.</p>
                    </div>
                </div>
            );
        }

        // 아이콘 렌더링 도우미
        function IconUpdater() {
            useEffect(() => { lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
