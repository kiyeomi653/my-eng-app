<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Master Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [vocab, setVocab] = useState([]);
            const [settings, setSettings] = useState({ wordGoal: 20, writeGoal: 3 });
            const [progress, setProgress] = useState({ wordsDone: 0, writesDone: 0 });

            useEffect(() => {
                const savedVocab = localStorage.getItem('myVocab');
                const savedSettings = localStorage.getItem('mySettings');
                const savedProgress = localStorage.getItem('myProgress');
                if (savedVocab) setVocab(JSON.parse(savedVocab));
                if (savedSettings) setSettings(JSON.parse(savedSettings));
                if (savedProgress) setProgress(JSON.parse(savedProgress));
            }, []);

            const updateProgress = (newProgress) => {
                setProgress(newProgress);
                localStorage.setItem('myProgress', JSON.stringify(newProgress));
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const wsname = wb.SheetNames[0];
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wsname], { header: 1 });
                    const parsedData = data.slice(1).map(row => ({
                        word: row[0] || '', def: row[1] || '', ex: row[2] || ''
                    })).filter(item => item.word);
                    setVocab(parsedData);
                    localStorage.setItem('myVocab', JSON.stringify(parsedData));
                    alert(`${parsedData.length}개 단어 업로드 완료!`);
                    setPage('study');
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-indigo-600">English Master</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 border rounded-xl shadow-sm">
                            <i data-lucide={menuOpen ? "x" : "menu"}></i>
                        </button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-16 w-56 bg-white rounded-3xl p-6 shadow-2xl space-y-5" onClick={e => e.stopPropagation()}>
                                <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold"><i data-lucide="layout"></i> 홈</div>
                                <div onClick={() => {setPage('settings'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold"><i data-lucide="settings"></i> 목표 설정</div>
                                <div onClick={() => {setPage('upload'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold"><i data-lucide="file-up"></i> 엑셀 업로드</div>
                                <div onClick={() => {setPage('study'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold"><i data-lucide="book-open"></i> 단어 학습</div>
                                <div onClick={() => {setPage('writing'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold"><i data-lucide="pen-tool"></i> 작문 및 첨삭</div>
                            </div>
                        </div>
                    )}

                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && <DashboardView settings={settings} progress={progress} />}
                        {page === 'settings' && <SettingsView settings={settings} setSettings={(s) => {setSettings(s); localStorage.setItem('mySettings', JSON.stringify(s));}} />}
                        {page === 'upload' && (
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border text-center">
                                <i data-lucide="file-spreadsheet" size="40" className="mx-auto mb-4 text-indigo-600"></i>
                                <h2 className="text-xl font-bold mb-4">엑셀 파일 업로드</h2>
                                <label className="block w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold cursor-pointer transition">
                                    파일 선택
                                    <input type="file" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} className="hidden" />
                                </label>
                            </div>
                        )}
                        {page === 'study' && <StudyView vocab={vocab} progress={progress} updateProgress={updateProgress} />}
                        {page === 'writing' && <WritingView progress={progress} updateProgress={updateProgress} />}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function DashboardView({ settings, progress }) {
            const wordRate = Math.min(100, (progress.wordsDone / settings.wordGoal) * 100);
            const writeRate = Math.min(100, (progress.writesDone / settings.writeGoal) * 100);
            const totalRate = Math.round((wordRate + writeRate) / 2);

            return (
                <div className="space-y-6">
                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <p className="opacity-80">오늘의 달성도</p>
                        <h2 className="text-5xl font-black mt-2">{totalRate}%</h2>
                        <div className="w-full bg-white/20 h-3 rounded-full mt-6 overflow-hidden">
                            <div className="bg-white h-3 rounded-full transition-all duration-1000" style={{width: `${totalRate}%`}}></div>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm flex justify-around">
                        <div className="text-center"><p className="text-xs font-bold text-slate-400">단어</p><p className="text-xl font-black">{progress.wordsDone}/{settings.wordGoal}</p></div>
                        <div className="text-center"><p className="text-xs font-bold text-slate-400">작문</p><p className="text-xl font-black">{progress.writesDone}/{settings.writeGoal}</p></div>
                    </div>
                </div>
            );
        }

        function SettingsView({ settings, setSettings }) {
            return (
                <div className="bg-white p-8 rounded-[2rem] shadow-sm border space-y-6">
                    <h2 className="text-xl font-bold">🎯 목표 설정</h2>
                    <div><label className="text-sm font-bold block mb-2">단어 ({settings.wordGoal}개)</label><input type="range" min="5" max="100" step="5" value={settings.wordGoal} onChange={(e) => setSettings({...settings, wordGoal: e.target.value})} className="w-full accent-indigo-600" /></div>
                    <div><label className="text-sm font-bold block mb-2">작문 ({settings.writeGoal}회)</label><input type="range" min="1" max="10" step="1" value={settings.writeGoal} onChange={(e) => setSettings({...settings, writeGoal: e.target.value})} className="w-full accent-indigo-600" /></div>
                </div>
            );
        }

        function StudyView({ vocab, progress, updateProgress }) {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            if (vocab.length === 0) return <div className="text-center py-20 text-slate-400">단어장을 업로드하세요.</div>;
            return (
                <div className="flex flex-col items-center">
                    <div onClick={() => setFlipped(!flipped)} className={`w-full aspect-square flex flex-col items-center justify-center p-8 rounded-[3rem] shadow-2xl transition-all ${flipped ? 'bg-indigo-600 text-white' : 'bg-white border-2'}`}>
                        <h3 className="text-3xl font-black text-center">{flipped ? vocab[idx].def : vocab[idx].word}</h3>
                        {flipped && <p className="mt-6 italic opacity-80 text-center">{vocab[idx].ex}</p>}
                    </div>
                    <div className="mt-10 flex gap-8 items-center">
                        <button onClick={() => {if(idx<vocab.length-1){setIdx(idx+1); setFlipped(false); updateProgress({...progress, wordsDone: progress.wordsDone+1})}}} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold">다음 단어</button>
                    </div>
                </div>
            );
        }

        function WritingView({ progress, updateProgress }) {
            const [text, setText] = useState('');
            const [result, setResult] = useState(null);

            const handleCheck = () => {
                if (text.trim().length === 0) return;
                
                // 실제 서비스 시에는 API(OpenAI 등)를 연결해야 하지만,
                // 여기서는 사용자가 입력한 문장을 바탕으로 한 시뮬레이션 결과를 보여줍니다.
                setResult({
                    original: text,
                    corrected: text.toLowerCase().includes('is') && text.toLowerCase().includes('i ') ? text.replace(/is/i, "am") : text,
                    translation: "나는 학생입니다. (예시 번역)", // 실제는 번역 API 연동 필요
                    error: text.toLowerCase().includes('is') && text.toLowerCase().includes('i ') ? "be동사 일치 오류" : "문법적 오류 없음"
                });
                updateProgress({...progress, writesDone: progress.writesDone + 1});
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <h2 className="text-xl font-bold mb-4">AI 작문 첨삭</h2>
                        <textarea className="w-full h-32 p-4 bg-slate-50 border-none rounded-2xl outline-none" placeholder="영작을 입력하세요 (예: I is a student)" value={text} onChange={(e) => setText(e.target.value)} />
                        <button onClick={handleCheck} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-bold">평가 및 완료</button>
                    </div>

                    {result && (
                        <div className="bg-white p-6 rounded-[2rem] border shadow-lg space-y-4 animate-in fade-in slide-in-from-bottom-4">
                            <div>
                                <h4 className="text-xs font-bold text-slate-400 mb-1">입력한 문장</h4>
                                <p className="text-red-500 line-through">{result.original}</p>
                            </div>
                            <div>
                                <h4 className="text-xs font-bold text-slate-400 mb-1">교정된 문장</h4>
                                <p className="text-emerald-600 font-bold">{result.corrected}</p>
                            </div>
                            <div className="pt-2 border-t">
                                <h4 className="text-xs font-bold text-indigo-400 mb-1">한국어 번역</h4>
                                <p className="text-slate-700 font-medium bg-indigo-50 p-3 rounded-xl">{result.translation}</p>
                            </div>
                            <div className="text-xs text-amber-600 bg-amber-50 p-2 rounded-lg font-bold italic">
                                💡 피드백: {result.error}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
