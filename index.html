<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI English Tutor</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .diff-red { color: #ef4444; font-weight: bold; text-decoration: underline; }
        .diff-green { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- AI가 제안할 기본 단어 데이터베이스 (예시 10개, 실제로는 더 많이 확장 가능) ---
        const AI_VOCAB_DB = [
            { word: "Cunning", def: "교활한, 영리한", ex: "The fox used a cunning trick to escape." },
            { word: "Abundant", def: "풍부한", ex: "The area is abundant in natural resources." },
            { word: "Meticulous", def: "세심한, 꼼꼼한", ex: "He is meticulous about his work." },
            { word: "Diminish", def: "줄어들다", ex: "The pain will gradually diminish." },
            { word: "Adversary", def: "상대방, 적", ex: "He defeated his old adversary in the match." },
            { word: "Destination", def: "목적지", ex: "We arrived at our destination at sunset." },
            { word: "Ignite", def: "불을 붙이다", ex: "The spark ignited the dry wood." },
            { word: "Eloquent", def: "유창한, 웅변의", ex: "The president gave an eloquent speech." },
            { word: "Reluctant", def: "꺼리는", ex: "He was reluctant to admit his mistake." },
            { word: "Versatile", def: "다재다능한", ex: "Eggs are a versatile ingredient in cooking." }
        ];

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [currentWord, setCurrentWord] = useState(AI_VOCAB_DB[0]);
            const [progress, setProgress] = useState({ wordsDone: 0, writesDone: 0 });
            const [settings, setSettings] = useState({ wordGoal: 10, writeGoal: 3 });

            // 음성 읽기 기능 (TTS)
            const speak = (text) => {
                window.speechSynthesis.cancel(); // 이전 음성 중단
                const speech = new SpeechSynthesisUtterance(text);
                speech.lang = 'en-US';
                speech.rate = 0.9; // 약간 천천히
                window.speechSynthesis.speak(speech);
            };

            // AI 단어 랜덤 제안 로직
            const getNextAIWord = () => {
                const randomIndex = Math.floor(Math.random() * AI_VOCAB_DB.length);
                setCurrentWord(AI_VOCAB_DB[randomIndex]);
                setProgress(prev => ({...prev, wordsDone: prev.wordsDone + 1}));
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-indigo-600">AI Tutor</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 border rounded-xl"><i data-lucide="menu"></i></button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-16 w-56 bg-white rounded-3xl p-6 shadow-2xl space-y-4" onClick={e => e.stopPropagation()}>
                                <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-3 font-bold"><i data-lucide="layout"></i> 홈</div>
                                <div onClick={() => {setPage('study'); setMenuOpen(false)}} className="flex items-center gap-3 font-bold"><i data-lucide="sparkles"></i> AI 단어 추천</div>
                                <div onClick={() => {setPage('quiz'); setMenuOpen(false)}} className="flex items-center gap-3 font-bold"><i data-lucide="pencil"></i> 영작 퀴즈</div>
                            </div>
                        </div>
                    )}

                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && <Dashboard progress={progress} settings={settings} />}
                        {page === 'study' && (
                            <div className="space-y-6 text-center animate-in fade-in zoom-in duration-300">
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border-2 border-indigo-50 relative overflow-hidden">
                                    <button onClick={() => speak(currentWord.word)} className="absolute top-6 right-6 p-3 bg-indigo-50 text-indigo-600 rounded-full active:scale-90 transition">
                                        <i data-lucide="volume-2"></i>
                                    </button>
                                    <p className="text-sm font-bold text-indigo-400 mb-2 uppercase tracking-widest">AI 추천 단어</p>
                                    <h2 className="text-4xl font-black text-slate-800 mb-4">{currentWord.word}</h2>
                                    <p className="text-xl font-medium text-slate-600 mb-6">{currentWord.def}</p>
                                    <div className="p-4 bg-slate-50 rounded-2xl italic text-slate-500 text-sm leading-relaxed">
                                        "{currentWord.ex}"
                                        <button onClick={() => speak(currentWord.ex)} className="ml-2 inline-block align-middle text-indigo-400"><i data-lucide="play" size="14"></i></button>
                                    </div>
                                </div>
                                <button onClick={getNextAIWord} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 active:scale-95 transition">
                                    다음 AI 추천 단어 보기
                                </button>
                            </div>
                        )}
                        {page === 'quiz' && <QuizView currentWord={currentWord} getNextAIWord={getNextAIWord} setProgress={setProgress} speak={speak} />}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        // --- 대시보드 컴포넌트 ---
        function Dashboard({ progress, settings }) {
            const rate = Math.min(100, Math.round(((progress.wordsDone / settings.wordGoal) * 100)));
            return (
                <div className="space-y-6">
                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <p className="opacity-80 font-medium">오늘의 AI 학습 달성도</p>
                        <h2 className="text-6xl font-black mt-2">{rate}%</h2>
                        <div className="w-full bg-white/20 h-3 rounded-full mt-6 overflow-hidden">
                            <div className="bg-white h-full transition-all duration-1000" style={{width: `${rate}%`}}></div>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-3xl border text-center">
                        <p className="text-slate-400 text-sm font-bold mb-1">학습한 단어 수</p>
                        <p className="text-3xl font-black text-slate-800">{progress.wordsDone} <span className="text-lg text-slate-300">/ {settings.wordGoal}</span></p>
                    </div>
                </div>
            );
        }

        // --- 퀴즈 및 실시간 번역/첨삭 컴포넌트 ---
        function QuizView({ currentWord, getNextAIWord, setProgress, speak }) {
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [translated, setTranslated] = useState('');

            const handleCheck = async () => {
                // 1. 실제 구글 번역 호출
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(input)}`);
                    const data = await res.json();
                    setTranslated(data[0][0][0]);
                } catch(e) { setTranslated("번역 오류 발생"); }

                // 2. 단어별 일치 여부 분석
                const userWords = input.trim().split(/\s+/);
                const targetWords = currentWord.ex.trim().split(/\s+/);
                const diff = userWords.map((word, i) => ({
                    word,
                    isCorrect: word.toLowerCase().replace(/[.,!?]/g, "") === targetWords[i]?.toLowerCase().replace(/[.,!?]/g, "")
                }));

                setResult(diff);
                setProgress(prev => ({...prev, writesDone: prev.writesDone + 1}));
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <h3 className="font-bold text-slate-400 text-sm mb-2 uppercase tracking-tighter">아래 문장을 영작하세요</h3>
                        <p className="text-xl font-bold text-slate-800 mb-4 italic">" {currentWord.def}와 관련된 예문: {currentWord.ex} "</p>
                        <textarea className="w-full h-32 p-4 bg-slate-50 border-none rounded-2xl outline-none text-lg" 
                            placeholder="이곳에 영작... (단어: ${currentWord.word} 사용)" value={input} onChange={(e) => setInput(e.target.value)} />
                        <button onClick={handleCheck} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">제출 및 AI 분석</button>
                    </div>

                    {result && (
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-xl space-y-4 animate-in slide-in-from-bottom-4">
                            <div>
                                <h4 className="text-xs font-bold text-slate-400 mb-2">분석 결과 (빨간색: 틀림)</h4>
                                <div className="text-lg flex flex-wrap gap-x-2">
                                    {result.map((item, i) => (
                                        <span key={i} className={item.isCorrect ? "text-emerald-500 font-bold" : "diff-red"}>{item.word}</span>
                                    ))}
                                </div>
                            </div>
                            <div className="pt-4 border-t">
                                <h4 className="text-xs font-bold text-indigo-400 mb-1 tracking-widest">내가 쓴 문장 해석</h4>
                                <p className="text-slate-700 bg-indigo-50 p-3 rounded-xl font-medium">{translated}</p>
                            </div>
                            <button onClick={() => {setResult(null); setInput(''); getNextAIWord();}} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">다음 문제로 넘어가기</button>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
