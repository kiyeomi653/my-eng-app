<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Master Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .diff-red { color: #ef4444; font-weight: bold; text-decoration: underline; }
        .diff-green { color: #10b981; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [vocab, setVocab] = useState([]);
            const [settings, setSettings] = useState({ wordGoal: 20, writeGoal: 3 });
            const [progress, setProgress] = useState({ wordsDone: 0, writesDone: 0 });

            useEffect(() => {
                const savedVocab = localStorage.getItem('myVocab');
                const savedSettings = localStorage.getItem('mySettings');
                const savedProgress = localStorage.getItem('myProgress');
                if (savedVocab) setVocab(JSON.parse(savedVocab));
                if (savedSettings) setSettings(JSON.parse(savedSettings));
                if (savedProgress) setProgress(JSON.parse(savedProgress));
            }, []);

            const updateProgress = (newProgress) => {
                setProgress(newProgress);
                localStorage.setItem('myProgress', JSON.stringify(newProgress));
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                    const parsedData = data.slice(1).map(row => ({ word: row[0], def: row[1], ex: row[2] })).filter(i => i.word);
                    setVocab(parsedData);
                    localStorage.setItem('myVocab', JSON.stringify(parsedData));
                    setPage('study');
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-indigo-600">English Master</h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 border rounded-xl shadow-sm"><i data-lucide={menuOpen ? "x" : "menu"}></i></button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-16 w-56 bg-white rounded-3xl p-6 shadow-2xl space-y-5" onClick={e => e.stopPropagation()}>
                                <div onClick={() => {setPage('dashboard'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold cursor-pointer"><i data-lucide="layout"></i> 홈</div>
                                <div onClick={() => {setPage('settings'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold cursor-pointer"><i data-lucide="settings"></i> 목표 설정</div>
                                <div onClick={() => {setPage('upload'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold cursor-pointer"><i data-lucide="file-up"></i> 엑셀 업로드</div>
                                <div onClick={() => {setPage('study'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold cursor-pointer"><i data-lucide="book-open"></i> 단어 학습</div>
                                <div onClick={() => {setPage('writing'); setMenuOpen(false)}} className="flex items-center gap-4 font-bold cursor-pointer"><i data-lucide="pen-tool"></i> 작문 및 첨삭</div>
                            </div>
                        </div>
                    )}

                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && <DashboardView settings={settings} progress={progress} />}
                        {page === 'settings' && <SettingsView settings={settings} setSettings={(s) => {setSettings(s); localStorage.setItem('mySettings', JSON.stringify(s));}} />}
                        {page === 'upload' && <UploadView handleFileUpload={handleFileUpload} />}
                        {page === 'study' && <StudyView vocab={vocab} progress={progress} updateProgress={updateProgress} />}
                        {page === 'writing' && <WritingView progress={progress} updateProgress={updateProgress} />}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        // --- 기능별 컴포넌트 ---

        function DashboardView({ settings, progress }) {
            const wordRate = Math.min(100, (progress.wordsDone / settings.wordGoal) * 100);
            const writeRate = Math.min(100, (progress.writesDone / settings.writeGoal) * 100);
            const totalRate = Math.round((wordRate + writeRate) / 2);
            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <p className="opacity-80">오늘의 달성도</p>
                        <h2 className="text-5xl font-black mt-2">{totalRate}%</h2>
                        <div className="w-full bg-white/20 h-3 rounded-full mt-6 overflow-hidden">
                            <div className="bg-white h-3 rounded-full transition-all duration-1000" style={{width: `${totalRate}%`}}></div>
                        </div>
                    </div>
                </div>
            );
        }

        function UploadView({ handleFileUpload }) {
            return (
                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border text-center animate-in zoom-in-95 duration-300">
                    <i data-lucide="file-spreadsheet" size="40" className="mx-auto mb-4 text-indigo-600"></i>
                    <h2 className="text-xl font-bold mb-4">엑셀 파일 업로드</h2>
                    <label className="block w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold cursor-pointer shadow-lg shadow-indigo-100 active:scale-95 transition">
                        파일 선택
                        <input type="file" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} className="hidden" />
                    </label>
                </div>
            );
        }

        function WritingView({ progress, updateProgress }) {
            const [text, setText] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const handleAnalyze = async () => {
                if (!text.trim()) return;
                setLoading(true);
                try {
                    // 1. 실제 구글 번역 API 호출 (무료 엔드포인트 사용)
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(text)}`);
                    const data = await res.json();
                    const translatedText = data[0].map(item => item[0]).join('');

                    // 2. 단어별 비교 분석 (사용자가 자주 틀리는 패턴 기반 시뮬레이션)
                    // 실제 AI 첨삭 엔진이 없는 클라이언트 환경이므로, 패턴 매칭으로 틀린 단어를 찾아냅니다.
                    const words = text.split(' ');
                    const diffElements = words.map((word, idx) => {
                        let isError = false;
                        let correctedWord = word;

                        // 간단한 문법 교정 규칙 (예: I is -> I am, She go -> She goes)
                        if (word.toLowerCase() === 'is' && (words[idx-1]?.toLowerCase() === 'i')) { isError = true; correctedWord = 'am'; }
                        if (word.toLowerCase() === 'am' && (['he','she','it'].includes(words[idx-1]?.toLowerCase()))) { isError = true; correctedWord = 'is'; }
                        if (word.toLowerCase() === 'go' && (['he','she','it'].includes(words[idx-1]?.toLowerCase()))) { isError = true; correctedWord = 'goes'; }

                        return { original: word, corrected: correctedWord, isError };
                    });

                    const hasError = diffElements.some(e => e.isError);
                    const correctedSentence = diffElements.map(e => e.corrected).join(' ');

                    setResult({ diffElements, translatedText, hasError, correctedSentence });
                    updateProgress({...progress, writesDone: progress.writesDone + 1});
                } catch (err) {
                    alert('번역 중 오류가 발생했습니다.');
                }
                setLoading(false);
            };

            return (
                <div className="space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="pen-tool" size="18"></i> AI 작문 분석</h2>
                        <textarea className="w-full h-32 p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" 
                            placeholder="영작을 입력하세요 (예: I is a student)" value={text} onChange={(e) => setText(e.target.value)} />
                        <button onClick={handleAnalyze} disabled={loading} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg disabled:bg-slate-300">
                            {loading ? "분석 중..." : "번역 및 분석 완료"}
                        </button>
                    </div>

                    {result && (
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-xl space-y-6 overflow-hidden">
                            {/* 1. 단어별 분석 영역 */}
                            <div>
                                <h4 className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">나의 문장 분석</h4>
                                <div className="text-lg flex flex-wrap gap-1 leading-relaxed">
                                    {result.diffElements.map((el, i) => (
                                        <span key={i} className={el.isError ? "diff-red" : "text-slate-800"}>{el.original} </span>
                                    ))}
                                </div>
                            </div>

                            {/* 2. 교정 제안 (틀린 게 있을 때만 표시) */}
                            {result.hasError && (
                                <div className="p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                                    <h4 className="text-xs font-bold text-emerald-600 mb-1">올바른 제안</h4>
                                    <p className="text-emerald-800 font-bold">{result.correctedSentence}</p>
                                </div>
                            )}

                            {/* 3. 실제 번역 결과 */}
                            <div className="pt-4 border-t">
                                <h4 className="text-xs font-bold text-indigo-400 mb-2 uppercase tracking-widest">실제 한국어 번역</h4>
                                <div className="p-4 bg-indigo-50 rounded-2xl text-slate-700 font-medium leading-relaxed">
                                    {result.translatedText}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 기타 공통 컴포넌트 ---
        function SettingsView({ settings, setSettings }) {
            return (
                <div className="bg-white p-8 rounded-[2rem] shadow-sm border space-y-6">
                    <h2 className="text-xl font-bold">🎯 목표 설정</h2>
                    <div><label className="text-sm font-bold block mb-2">단어 ({settings.wordGoal}개)</label><input type="range" min="5" max="100" step="5" value={settings.wordGoal} onChange={(e) => setSettings({...settings, wordGoal: parseInt(e.target.value)})} className="w-full accent-indigo-600" /></div>
                    <div><label className="text-sm font-bold block mb-2">작문 ({settings.writeGoal}회)</label><input type="range" min="1" max="10" step="1" value={settings.writeGoal} onChange={(e) => setSettings({...settings, writeGoal: parseInt(e.target.value)})} className="w-full accent-indigo-600" /></div>
                </div>
            );
        }

        function StudyView({ vocab, progress, updateProgress }) {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            if (vocab.length === 0) return <div className="text-center py-20 text-slate-400 font-bold">엑셀 파일을 업로드하세요!</div>;
            return (
                <div className="flex flex-col items-center animate-in fade-in duration-500">
                    <div onClick={() => setFlipped(!flipped)} className={`w-full aspect-square flex flex-col items-center justify-center p-8 rounded-[3rem] shadow-2xl transition-all duration-500 ${flipped ? 'bg-indigo-600 text-white rotate-y-180' : 'bg-white border-2 border-slate-100'}`}>
                        <h3 className="text-3xl font-black text-center leading-tight">{flipped ? vocab[idx].def : vocab[idx].word}</h3>
                        {flipped && <p className="mt-6 text-indigo-100 italic text-center text-sm px-4">{vocab[idx].ex}</p>}
                    </div>
                    <button onClick={() => {if(idx < vocab.length-1){setIdx(idx+1); setFlipped(false); updateProgress({...progress, wordsDone: progress.wordsDone+1})}}} className="mt-10 bg-slate-900 text-white px-12 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">다음 단어</button>
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
