<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisdom AI Master</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; color: #1e293b; }
        .diff-red { color: #ef4444; font-weight: bold; text-decoration: underline; }
        .diff-green { color: #10b981; font-weight: bold; }
        .hint-badge { background: #eef2ff; color: #4f46e5; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; border: 1px solid #e0e7ff; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [page, setPage] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [loading, setLoading] = useState(true);
            const [level, setLevel] = useState('Medium'); // Easy, Medium, Hard
            const [history, setHistory] = useState([]);

            // 로컬 스토리지에서 데이터 불러오기
            useEffect(() => {
                const savedHistory = localStorage.getItem('wisdomHistory');
                const savedLevel = localStorage.getItem('wisdomLevel');
                if (savedHistory) setHistory(JSON.parse(savedHistory));
                if (savedLevel) setLevel(savedLevel);
                fetchNewQuote(savedLevel || 'Medium');
            }, []);

            // 명언 가져오기 (난이도별 글자수 제한 적용)
            const fetchNewQuote = async (targetLevel) => {
                setLoading(true);
                let minLen = 30, maxLen = 60;
                if (targetLevel === 'Easy') { minLen = 10; maxLen = 40; }
                else if (targetLevel === 'Hard') { minLen = 70; maxLen = 150; }

                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://zenquotes.io/api/random`)}`);
                    const json = await res.json();
                    const data = JSON.parse(json.contents)[0];
                    
                    const transRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(data.q)}`);
                    const transData = await transRes.json();
                    
                    setCurrentQuote({ author: data.a, def: transData[0][0][0], ex: data.q });
                } catch (e) {
                    setCurrentQuote({ author: "System", def: "여정 그 자체가 보상이다.", ex: "The journey is the reward." });
                }
                setLoading(false);
            };

            const saveToHistory = (quote, input, score) => {
                const newEntry = {
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    quote: quote.ex,
                    def: quote.def,
                    author: quote.author,
                    score: score
                };
                const updatedHistory = [newEntry, ...history].slice(0, 50); // 최근 50개 저장
                setHistory(updatedHistory);
                localStorage.setItem('wisdomHistory', JSON.stringify(updatedHistory));
            };

            const changeLevel = (newLevel) => {
                setLevel(newLevel);
                localStorage.setItem('wisdomLevel', newLevel);
                fetchNewQuote(newLevel);
            };

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const s = new SpeechSynthesisUtterance(text);
                s.lang = 'en-US';
                s.rate = 0.85;
                window.speechSynthesis.speak(s);
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
                        <h1 className="text-xl font-bold text-indigo-600 flex items-center gap-2">
                            <i data-lucide="crown" size="20"></i> Wisdom Master
                        </h1>
                        <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 border rounded-xl"><i data-lucide="menu"></i></button>
                    </header>

                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/40 z-40" onClick={() => setMenuOpen(false)}>
                            <div className="absolute right-4 top-16 w-56 bg-white rounded-3xl p-6 shadow-2xl space-y-4 animate-in" onClick={e => e.stopPropagation()}>
                                <MenuItem icon="layout" label="홈/설정" onClick={() => {setPage('dashboard'); setMenuOpen(false)}} />
                                <MenuItem icon="pencil" label="영작 퀴즈" onClick={() => {setPage('quiz'); setMenuOpen(false)}} />
                                <MenuItem icon="history" label="학습 기록" onClick={() => {setPage('history'); setMenuOpen(false)}} />
                            </div>
                        </div>
                    )}

                    <main className="p-5 max-w-md mx-auto">
                        {page === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                                    <h3 className="text-sm font-bold text-slate-400 mb-4 flex items-center gap-2"><i data-lucide="zap" size="14"></i> 난이도 선택</h3>
                                    <div className="grid grid-cols-3 gap-3">
                                        {['Easy', 'Medium', 'Hard'].map(l => (
                                            <button key={l} onClick={() => changeLevel(l)} 
                                                className={`py-3 rounded-2xl font-bold transition ${level === l ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-500'}`}>
                                                {l === 'Easy' ? '초급' : l === 'Medium' ? '중급' : '고급'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                                    <p className="opacity-70 text-xs font-bold tracking-widest mb-2">TODAY'S QUOTE</p>
                                    <h2 className="text-2xl font-black mb-4 leading-tight">"{currentQuote?.def}"</h2>
                                    <button onClick={() => setPage('quiz')} className="bg-white text-indigo-600 px-6 py-3 rounded-xl font-black text-sm">바로 도전하기</button>
                                </div>
                            </div>
                        )}

                        {page === 'quiz' && (
                            <QuizView 
                                currentQuote={currentQuote} 
                                fetchNewQuote={() => fetchNewQuote(level)} 
                                saveToHistory={saveToHistory}
                                speak={speak}
                                loading={loading}
                            />
                        )}

                        {page === 'history' && <HistoryView history={history} />}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function MenuItem({ icon, label, onClick }) {
            return (
                <div onClick={onClick} className="flex items-center gap-4 p-3 hover:bg-indigo-50 rounded-2xl font-bold cursor-pointer text-slate-700">
                    <i data-lucide={icon} size="20"></i> {label}
                </div>
            );
        }

        function HistoryView({ history }) {
            return (
                <div className="space-y-4 animate-in">
                    <h2 className="text-xl font-black mb-4 flex items-center gap-2"><i data-lucide="history"></i> 학습 기록</h2>
                    {history.length === 0 ? (
                        <div className="py-20 text-center text-slate-400 font-bold">아직 학습한 기록이 없습니다.</div>
                    ) : history.map((h, i) => (
                        <div key={i} className="bg-white p-5 rounded-3xl border shadow-sm">
                            <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-2">
                                <span>{h.date} {h.time}</span>
                                <span className="text-indigo-500">{h.score}</span>
                            </div>
                            <p className="text-sm font-bold text-slate-800 mb-1 leading-snug">"{h.def}"</p>
                            <p className="text-xs text-slate-400 italic">{h.quote}</p>
                        </div>
                    ))}
                </div>
            );
        }

        function QuizView({ currentQuote, fetchNewQuote, saveToHistory, speak, loading }) {
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [showHint, setShowHint] = useState(false);

            const shuffledWords = useMemo(() => {
                if (!currentQuote) return [];
                return currentQuote.ex.replace(/[.,!;?]/g, "").split(" ").sort(() => Math.random() - 0.5);
            }, [currentQuote]);

            const handleCheck = () => {
                const userWords = input.trim().split(/\s+/);
                const targetWords = currentQuote.ex.trim().split(/\s+/);
                let correctCount = 0;
                
                const diff = userWords.map((word, i) => {
                    const isCorrect = word.toLowerCase().replace(/[.,!?]/g, "") === targetWords[i]?.toLowerCase().replace(/[.,!?]/g, "");
                    if (isCorrect) correctCount++;
                    return { word, isCorrect };
                });

                const score = `${Math.round((correctCount / targetWords.length) * 100)}점`;
                setResult(diff);
                saveToHistory(currentQuote, input, score);
                speak(currentQuote.ex);
            };

            const next = () => {
                setResult(null); setInput(''); setShowHint(false); fetchNewQuote();
            };

            return (
                <div className="space-y-4 animate-in">
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                        <div className="flex justify-between mb-4 items-center">
                            <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Writing Quiz</span>
                            <button onClick={() => setShowHint(!showHint)} className="text-xs font-bold text-slate-400 flex items-center gap-1">
                                <i data-lucide="lightbulb" size="14"></i> 힌트
                            </button>
                        </div>
                        <h3 className="text-xl font-bold mb-6">"{currentQuote.def}"</h3>
                        {showHint && (
                            <div className="mb-6 p-4 bg-slate-50 rounded-2xl flex flex-wrap gap-2">
                                {shuffledWords.map((w, i) => <span key={i} className="hint-badge">{w}</span>)}
                            </div>
                        )}
                        <textarea className="w-full h-32 p-4 bg-slate-50 border-none rounded-2xl outline-none text-lg" 
                            placeholder="영어로 작문하세요..." value={input} onChange={(e) => setInput(e.target.value)} />
                        {!result ? (
                            <button onClick={handleCheck} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">정답 확인</button>
                        ) : (
                            <button onClick={next} className="w-full mt-4 bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg">다음 명언 {loading && "..."}</button>
                        )}
                    </div>

                    {result && (
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-xl space-y-4 animate-in">
                            <div className="text-lg flex flex-wrap gap-x-2">
                                {result.map((item, i) => (
                                    <span key={i} className={item.isCorrect ? "text-emerald-500 font-bold" : "diff-red"}>{item.word}</span>
                                ))}
                            </div>
                            <div className="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 flex justify-between items-center">
                                <p className="text-indigo-900 font-black text-sm">{currentQuote.ex}</p>
                                <button onClick={() => speak(currentQuote.ex)} className="text-indigo-600 p-2"><i data-lucide="volume-2" size="20"></i></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
