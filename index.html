<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI English Master 1000</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; }
        .diff-red { color: #ef4444; font-weight: bold; text-decoration: line-through; margin-right: 4px; }
        .diff-green { color: #10b981; font-weight: bold; margin-right: 4px; }
        .diff-normal { color: #64748b; margin-right: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- AI가 엄선한 미국 중학생 수준 필수 단어 & 한국어 기반 예문 DB (샘플 1000개 구조) ---
        const MASTER_DB = [
            { word: "Adversary", def: "상대방, 적", ko: "그는 경기에서 그의 오래된 적을 물리쳤다.", en: "He defeated his old adversary in the match." },
            { word: "Apprehensive", def: "걱정되는, 불안한", ko: "나는 그 수술에 대해 약간 걱정된다.", en: "I am a bit apprehensive about the surgery." },
            { word: "Attentive", def: "주의를 기울이는", ko: "학생들은 수업 시간 동안 매우 주의를 기울였다.", en: "The students were very attentive during class." },
            { word: "Banish", def: "추방하다", ko: "그는 그의 범죄 때문에 왕국에서 추방되었다.", en: "He was banished from the kingdom for his crimes." },
            { word: "Conspicuous", def: "눈에 띄는", ko: "그는 결석으로 인해 눈에 띄었다.", en: "He was conspicuous by his absence." },
            { word: "Destination", def: "목적지", ko: "우리는 일몰 때 목적지에 도착했다.", en: "We arrived at our destination at sunset." },
            { word: "Diminish", def: "줄어들다", ko: "통증은 서서히 줄어들 것이다.", en: "The pain will gradually diminish." },
            { word: "Emerge", def: "나타나다", ko: "한 형체가 어둠 속에서 나타났다.", en: "A figure emerged from the shadows." },
            { word: "Foresight", def: "선견지명", ko: "그는 우산을 가져오는 선견지명이 있었다.", en: "He had the foresight to bring an umbrella." },
            { word: "Meticulous", def: "꼼꼼한", ko: "그는 자신의 일에 대해 매우 꼼꼼하다.", en: "He is meticulous about his work." },
            { word: "Reluctant", def: "꺼리는", ko: "그는 자신의 실수를 인정하기를 꺼려했다.", en: "He was reluctant to admit his mistake." },
            { word: "Versatile", def: "다재다능한", ko: "계란은 요리에서 다재다능한 재료이다.", en: "Eggs are a versatile ingredient in cooking." }
            // ... 여기에 1000개까지 데이터를 추가할 수 있습니다.
        ];

        function App() {
            const [page, setPage] = useState('dashboard');
            const [quizItem, setQuizItem] = useState(MASTER_DB[0]);
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [progress, setProgress] = useState({ count: 0 });

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const s = new SpeechSynthesisUtterance(text);
                s.lang = 'en-US';
                window.speechSynthesis.speak(s);
            };

            const nextQuiz = () => {
                const random = MASTER_DB[Math.floor(Math.random() * MASTER_DB.length)];
                setQuizItem(random);
                setInput('');
                setResult(null);
            };

            const checkAnswer = () => {
                const userWords = input.trim().split(/\s+/);
                const correctWords = quizItem.en.trim().split(/\s+/);
                
                const analysis = userWords.map((word, i) => ({
                    text: word,
                    isCorrect: word.toLowerCase().replace(/[.,!?]/g, "") === (correctWords[i] || "").toLowerCase().replace(/[.,!?]/g, "")
                }));

                setResult(analysis);
                setProgress({ count: progress.count + 1 });
            };

            return (
                <div className="min-h-screen pb-10 flex flex-col items-center">
                    <header className="w-full max-w-md p-6 flex justify-between items-center bg-white shadow-sm sticky top-0 z-10">
                        <h1 className="text-xl font-black text-indigo-600 tracking-tight">AI 1000 TUTOR</h1>
                        <div className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">
                            오늘의 학습: {progress.count}
                        </div>
                    </header>

                    <main className="w-full max-w-md p-5 space-y-6">
                        {/* 문제 제시 카드 */}
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white relative">
                            <div className="absolute -top-3 left-8 bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Question</div>
                            <h2 className="text-2xl font-bold text-slate-800 leading-tight mb-4 mt-2">
                                "{quizItem.ko}"
                            </h2>
                            <p className="text-slate-400 text-sm font-medium">사용 단어: <span className="text-indigo-500 font-bold underline">{quizItem.word}</span></p>
                        </div>

                        {/* 입력창 */}
                        <div className="space-y-4">
                            <textarea 
                                className="w-full h-32 p-6 bg-white border-2 border-slate-100 rounded-[2rem] outline-none focus:border-indigo-500 text-lg shadow-inner transition-all"
                                placeholder="영작을 입력하세요..."
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                            />
                            {!result ? (
                                <button onClick={checkAnswer} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-indigo-100 active:scale-95 transition">정답 확인 및 AI 분석</button>
                            ) : (
                                <button onClick={nextQuiz} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 transition">다음 문제 도전</button>
                            )}
                        </div>

                        {/* 결과 분석창 */}
                        {result && (
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border-t-4 border-indigo-500 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                <div className="mb-6">
                                    <h4 className="text-xs font-black text-slate-400 mb-3 uppercase tracking-tighter">실시간 첨삭 결과</h4>
                                    <div className="flex flex-wrap text-lg">
                                        {result.map((item, i) => (
                                            <span key={i} className={item.isCorrect ? "diff-green" : "diff-red"}>{item.text}</span>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="space-y-4 pt-4 border-t border-slate-50">
                                    <div className="flex items-start gap-3">
                                        <div className="bg-emerald-100 text-emerald-600 p-2 rounded-full"><i data-lucide="check" size="16"></i></div>
                                        <div>
                                            <p className="text-xs font-bold text-slate-400">정답 예시</p>
                                            <p className="text-slate-800 font-bold text-lg">{quizItem.en}</p>
                                        </div>
                                        <button onClick={() => speak(quizItem.en)} className="ml-auto p-2 bg-slate-100 rounded-full"><i data-lucide="volume-2" size="18"></i></button>
                                    </div>
                                    <div className="bg-indigo-50 p-4 rounded-2xl">
                                        <p className="text-xs font-bold text-indigo-400 mb-1 italic">Tutor's Tip</p>
                                        <p className="text-indigo-900 text-sm font-medium">"{quizItem.word}"은(는) '{quizItem.def}'라는 뜻입니다. 문장에서 위치를 다시 확인해보세요!</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <IconUpdate />
                </div>
            );
        }

        function IconUpdate() {
            useEffect(() => { if (window.lucide) lucide.createIcons(); });
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
